<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>户型家具摆放模拟器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f3f4f6; }
        .grid-bg {
            background-size: 20px 20px;
            background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px),
                              linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
        }
        /* 隐藏滚动条但保留滚动功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            // 状态管理
            const [bgImage, setBgImage] = useState(null);
            // 核心比例：1米等于多少像素，默认估算为 120
            const [ppm, setPpm] = useState(120); 
            // 家具列表
            const [items, setItems] = useState([
                { id: 1, name: '办公桌', w: 1.8, h: 0.6, x: 300, y: 300, r: 0, color: '#d97706' }
            ]);
            const [selectedId, setSelectedId] = useState(1);
            
            // 拖拽状态
            const [draggingId, setDraggingId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

            // 比例尺状态 (用于校准)
            const [showRuler, setShowRuler] = useState(true);
            const [rulerLength, setRulerLength] = useState(3.03); // 默认使用图纸上的 3.03m 墙作为参考
            const [rulerState, setRulerState] = useState({ x: 40, y: 40, r: 0 }); // 新增：参考线的位置和旋转状态
            
            // 新增：自定义家具配置状态
            const [customConfig, setCustomConfig] = useState({ name: '自定义物品', w: 1.0, h: 1.0, color: '#8b5cf6' });

            const containerRef = useRef(null);

            // 处理粘贴图片 (绕过部分上传限制)
            useEffect(() => {
                const handlePaste = (e) => {
                    const items = e.clipboardData?.items;
                    if (!items) return;
                    for (let i = 0; i < items.length; i++) {
                        if (items[i].type.indexOf('image') !== -1) {
                            const blob = items[i].getAsFile();
                            const reader = new FileReader();
                            reader.onload = (event) => setBgImage(event.target.result);
                            reader.onerror = () => alert("粘贴读取失败");
                            reader.readAsDataURL(blob);
                        }
                    }
                };
                window.addEventListener('paste', handlePaste);
                return () => window.removeEventListener('paste', handlePaste);
            }, []);

            // 处理图片上传
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                // 强制使用 FileReader 读取为 Base64 (Data URL)，这能避开沙盒环境对 Blob URL 的显示限制
                const reader = new FileReader();
                reader.onload = (event) => {
                    setBgImage(event.target.result);
                };
                reader.onerror = () => {
                    console.error("图片读取失败");
                    alert("图片读取失败，请检查文件格式。");
                };
                reader.readAsDataURL(file);
            };

            // 家具选项库
            const furnitureOptions = [
                { name: '办公桌', w: 1.8, h: 0.6, color: '#d97706' },
                { name: '双人床', w: 1.5, h: 2.0, color: '#be185d' },
                { name: '单人床', w: 1.2, h: 2.0, color: '#047857' },
                { name: '大型家具', w: 2.4, h: 1.25, color: '#4338ca' }
            ];

            // 添加新物品
            const addItem = (opt) => {
                const newItem = {
                    id: Date.now(),
                    name: opt.name,
                    w: opt.w,
                    h: opt.h,
                    x: containerRef.current ? containerRef.current.scrollLeft + 100 : 100,
                    y: containerRef.current ? containerRef.current.scrollTop + 100 : 100,
                    r: 0,
                    color: opt.color
                };
                setItems([...items, newItem]);
                setSelectedId(newItem.id);
            };

            // 新增：添加自定义物品
            const addCustomItem = () => {
                const newItem = {
                    id: Date.now(),
                    name: customConfig.name || '未命名',
                    w: Number(customConfig.w) || 1,
                    h: Number(customConfig.h) || 1,
                    x: containerRef.current ? containerRef.current.scrollLeft + 100 : 100,
                    y: containerRef.current ? containerRef.current.scrollTop + 100 : 100,
                    r: 0,
                    color: customConfig.color || '#8b5cf6'
                };
                setItems([...items, newItem]);
                setSelectedId(newItem.id);
            };

            // 鼠标/触摸按下：开始拖拽
            const handlePointerDown = (e, id, itemX, itemY) => {
                e.stopPropagation();
                setDraggingId(id);
                setSelectedId(id);
                
                const container = containerRef.current;
                const rect = container.getBoundingClientRect();
                
                // 计算鼠标在容器内的绝对坐标（包含滚动条偏移）
                const pointerX = e.clientX - rect.left + container.scrollLeft;
                const pointerY = e.clientY - rect.top + container.scrollTop;
                
                setDragOffset({
                    x: pointerX - itemX,
                    y: pointerY - itemY
                });
            };

            // 鼠标/触摸移动：拖拽中
            const handlePointerMove = (e) => {
                if (draggingId === null) return;
                
                const container = containerRef.current;
                const rect = container.getBoundingClientRect();
                
                const pointerX = e.clientX - rect.left + container.scrollLeft;
                const pointerY = e.clientY - rect.top + container.scrollTop;

                if (draggingId === 'ruler') {
                    // 如果正在拖拽的是参考线
                    setRulerState(prev => ({
                        ...prev,
                        x: pointerX - dragOffset.x,
                        y: pointerY - dragOffset.y
                    }));
                } else {
                    // 如果正在拖拽的是桌子
                    setItems(items.map(item => {
                        if (item.id === draggingId) {
                            return { ...item, x: pointerX - dragOffset.x, y: pointerY - dragOffset.y };
                        }
                        return item;
                    }));
                }
            };

            // 鼠标/触摸松开：结束拖拽
            const handlePointerUp = () => {
                setDraggingId(null);
            };

            // 全局监听鼠标松开，防止滑出目标后无法触发
            useEffect(() => {
                window.addEventListener('pointerup', handlePointerUp);
                return () => window.removeEventListener('pointerup', handlePointerUp);
            }, []);

            // 旋转选中的物品
            const rotateSelected = (degrees) => {
                setItems(items.map(item => {
                    if (item.id === selectedId) {
                        return { ...item, r: (item.r + degrees) % 360 };
                    }
                    return item;
                }));
            };

            // 删除选中的物品
            const deleteSelected = () => {
                setItems(items.filter(item => item.id !== selectedId));
                setSelectedId(null);
            };

            return (
                <div className="flex flex-col md:flex-row h-screen w-screen overflow-hidden font-sans text-gray-800">
                    {/* 左侧控制面板 */}
                    <div className="w-full md:w-80 md:h-full h-1/2 flex-shrink-0 bg-white shadow-xl z-20 flex flex-col p-5 overflow-y-auto border-r border-gray-200">
                        <h1 className="text-xl font-bold mb-4 text-gray-900 border-b pb-2">户型家具摆放</h1>
                        
                        {/* 步骤 1: 上传图纸 */}
                        <div className="mb-6">
                            <h2 className="text-sm font-semibold text-gray-500 mb-2">1. 上传户型图</h2>
                            <input 
                                type="file" 
                                accept="image/*" 
                                onChange={handleImageUpload}
                                onClick={(e) => { e.target.value = null; }} 
                                className="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                            />
                        </div>

                        {/* 步骤 2: 比例校准 */}
                        <div className="mb-6 bg-yellow-50 p-3 rounded-lg border border-yellow-200">
                            <h2 className="text-sm font-semibold text-gray-700 mb-2 flex justify-between items-center">
                                <span>2. 校准比例尺</span>
                                <label className="flex items-center space-x-2 text-xs">
                                    <input type="checkbox" checked={showRuler} onChange={(e) => setShowRuler(e.target.checked)} />
                                    <span>显示参考线</span>
                                </label>
                            </h2>
                            <p className="text-xs text-gray-500 mb-2">
                                <strong>拖拽</strong> 画布上的红线移动位置。调整滑块对齐墙壁。
                            </p>
                            <div className="flex gap-2 mb-3">
                                <button onClick={() => setRulerState(p => ({...p, r: (p.r - 90) % 360}))} className="flex-1 bg-white border border-yellow-300 hover:bg-yellow-100 py-1 rounded text-xs text-yellow-700 transition">↺ 转 90°</button>
                                <button onClick={() => setRulerState(p => ({...p, r: (p.r + 90) % 360}))} className="flex-1 bg-white border border-yellow-300 hover:bg-yellow-100 py-1 rounded text-xs text-yellow-700 transition">↻ 转 90°</button>
                            </div>
                            <input 
                                type="range" 
                                min="10" max="300" 
                                value={ppm} 
                                onChange={(e) => setPpm(Number(e.target.value))}
                                className="w-full accent-yellow-500 mb-1"
                            />
                            <div className="text-xs text-right text-gray-500">
                                当前: 1米 = {ppm} 像素
                            </div>
                        </div>

                        {/* 步骤 3: 物品控制 */}
                        <div className="mb-6">
                            <h2 className="text-sm font-semibold text-gray-500 mb-2">3. 家具添加与控制</h2>
                            
                            <div className="grid grid-cols-2 gap-2 mb-4">
                                {furnitureOptions.map((opt, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => addItem(opt)}
                                        className="bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 text-xs font-medium py-2 px-1 rounded-md transition flex flex-col items-center shadow-sm"
                                        style={{ borderTop: `4px solid ${opt.color}` }}
                                    >
                                        <span className="mb-1 font-bold">{opt.name}</span>
                                        <span className="text-[10px] text-gray-400 font-normal">{opt.w}m x {opt.h}m</span>
                                    </button>
                                ))}
                            </div>

                            {/* 新增：自定义家具面板 */}
                            <div className="bg-purple-50 p-3 rounded-lg border border-purple-200 mb-4">
                                <p className="text-sm font-medium mb-2 text-purple-800">✏️ 自定义家具</p>
                                <div className="grid grid-cols-2 gap-2 mb-2 text-xs">
                                    <div>
                                        <label className="block text-gray-600 mb-1">名称</label>
                                        <input type="text" value={customConfig.name} onChange={e => setCustomConfig({...customConfig, name: e.target.value})} className="w-full border border-gray-300 rounded px-2 py-1 outline-none focus:border-purple-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-600 mb-1">颜色</label>
                                        <input type="color" value={customConfig.color} onChange={e => setCustomConfig({...customConfig, color: e.target.value})} className="w-full h-[26px] border border-gray-300 rounded px-1 py-0 cursor-pointer bg-white" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-600 mb-1">宽度 (m)</label>
                                        <input type="number" step="0.1" min="0.1" value={customConfig.w} onChange={e => setCustomConfig({...customConfig, w: e.target.value})} className="w-full border border-gray-300 rounded px-2 py-1 outline-none focus:border-purple-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-600 mb-1">长度 (m)</label>
                                        <input type="number" step="0.1" min="0.1" value={customConfig.h} onChange={e => setCustomConfig({...customConfig, h: e.target.value})} className="w-full border border-gray-300 rounded px-2 py-1 outline-none focus:border-purple-500" />
                                    </div>
                                </div>
                                <button onClick={addCustomItem} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-1.5 rounded text-sm transition shadow-sm">
                                    ➕ 添加自定义家具
                                </button>
                            </div>

                            {selectedId && selectedId !== 'ruler' ? (
                                <div className="bg-gray-50 p-3 rounded-lg border border-gray-200">
                                    <p className="text-sm font-medium mb-3 text-gray-700">调整当前选中物品</p>
                                    <div className="grid grid-cols-2 gap-2 mb-2">
                                        <button onClick={() => rotateSelected(-90)} className="bg-white border border-gray-300 hover:bg-gray-100 py-1 px-2 rounded text-sm">↺ 左转 90°</button>
                                        <button onClick={() => rotateSelected(90)} className="bg-white border border-gray-300 hover:bg-gray-100 py-1 px-2 rounded text-sm">↻ 右转 90°</button>
                                    </div>
                                    <button onClick={deleteSelected} className="w-full mt-2 bg-red-100 hover:bg-red-200 text-red-700 py-1 px-2 rounded text-sm">
                                        删除该物品
                                    </button>
                                </div>
                            ) : (
                                <p className="text-sm text-gray-400 italic text-center">点击图纸上的家具进行编辑</p>
                            )}
                        </div>
                        
                        <div className="mt-auto pt-4 border-t text-xs text-gray-400">
                            提示: 直接在右侧拖拽桌子进行移动。
                        </div>
                    </div>

                    {/* 右侧画布区域 */}
                    <div 
                        className="flex-1 relative overflow-auto grid-bg cursor-crosshair no-scrollbar touch-none h-1/2 md:h-full"
                        ref={containerRef}
                        onPointerMove={handlePointerMove}
                    >
                        {/* 提示上传背景 */}
                        {!bgImage && (
                            <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-0">
                                <div className="text-gray-400 text-lg font-medium tracking-widest mb-2">请在左侧上传平面图</div>
                                <div className="text-gray-400 text-sm">或者直接在此处按 <kbd className="bg-gray-200 px-1 rounded text-gray-700 shadow-sm">Ctrl+V</kbd> 粘贴图片</div>
                            </div>
                        )}

                        {/* 背景图纸 */}
                        {bgImage && (
                            <img 
                                src={bgImage} 
                                alt="Floor Plan" 
                                onError={() => alert("图片加载失败：浏览器的安全限制阻止了图片的显示。")}
                                className="absolute top-0 left-0 pointer-events-none origin-top-left shadow-lg"
                                style={{ zIndex: 0 }}
                            />
                        )}

                        {/* 比例参考尺 (红色线条) */}
                        {showRuler && (
                            <div 
                                className={`absolute bg-red-500/80 border-2 border-red-700 flex items-center justify-center text-white text-xs font-bold shadow-md z-40 cursor-move transition-shadow ${selectedId === 'ruler' ? 'ring-2 ring-red-400 ring-offset-2' : ''}`}
                                style={{ 
                                    width: `${rulerLength * ppm}px`, 
                                    height: '10px',
                                    left: `${rulerState.x}px`,
                                    top: `${rulerState.y}px`,
                                    transform: `rotate(${rulerState.r}deg)`,
                                    borderRadius: '5px',
                                    touchAction: 'none'
                                }}
                                onPointerDown={(e) => handlePointerDown(e, 'ruler', rulerState.x, rulerState.y)}
                            >
                                <span 
                                    className="absolute whitespace-nowrap bg-white text-red-600 px-1 rounded shadow text-[10px] pointer-events-none"
                                    style={{ 
                                        top: '-24px',
                                        transform: `rotate(${-rulerState.r}deg)` // 文字反向旋转，保证无论参考线怎么转，文字始终水平正向
                                    }}
                                >
                                    参考线：{rulerLength}m
                                </span>
                            </div>
                        )}

                        {/* 所有的家具物品 */}
                        {items.map(item => (
                            <div 
                                key={item.id}
                                className="absolute flex flex-col items-center justify-center cursor-move select-none transition-shadow"
                                style={{
                                    width: `${item.w * ppm}px`,
                                    height: `${item.h * ppm}px`,
                                    left: `${item.x}px`,
                                    top: `${item.y}px`,
                                    transform: `rotate(${item.r}deg)`,
                                    backgroundColor: `${item.color}cc`, // cc 增加透明度
                                    border: item.id === selectedId ? '3px solid #000' : '2px solid rgba(0,0,0,0.5)',
                                    boxShadow: item.id === selectedId ? '0 10px 25px -5px rgba(0, 0, 0, 0.5)' : '0 4px 6px -1px rgba(0, 0, 0, 0.3)',
                                    zIndex: item.id === selectedId ? 30 : 10,
                                    borderRadius: '4px',
                                    touchAction: 'none' // 禁用浏览器默认触摸行为以优化拖拽
                                }}
                                onPointerDown={(e) => handlePointerDown(e, item.id, item.x, item.y)}
                            >
                                <span className="text-white font-bold drop-shadow-md text-sm pointer-events-none text-center leading-tight">
                                    {item.name}<br/>
                                    <span className="text-xs opacity-80">{item.w}m x {item.h}m</span>
                                </span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
