<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2D/3D 二合一户型模拟器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f3f4f6; touch-action: none; }
        .grid-bg-dynamic {
            background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px),
                              linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 3D 准星样式 */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            transform: translate(-50%, -50%); pointer-events: none; opacity: 0.8; z-index: 10;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: white; box-shadow: 0 0 2px rgba(0,0,0,0.5); }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        
        /* 绘制时的十字光标 */
        .cursor-drawing { cursor: crosshair !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 3D 视图组件
        // ==========================================
        const RoomViewer3D = ({ items, ppm, originPos, walls, wallHeight, onExit }) => {
            const mountRef = useRef(null);
            const minimapRef = useRef(null);

            useEffect(() => {
                let animationId;
                const container = mountRef.current;

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0xf0f4f8);
                scene.fog = new THREE.Fog(0xf0f4f8, 2, 20);

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.set(0, 1.6, 0); // 默认位置
                camera.rotation.order = 'YXZ';

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                container.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 0.5));
                const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
                dirLight.position.set(5, 10, 5);
                dirLight.castShadow = true;
                scene.add(dirLight);
                
                const pointLight = new THREE.PointLight(0xfffae6, 0.6, 15);
                pointLight.position.set(0, 2.5, 0);
                pointLight.castShadow = true;
                scene.add(pointLight);

                const floorGeo = new THREE.PlaneGeometry(50, 50);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.8 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                scene.add(floor);
                
                const gridHelper = new THREE.GridHelper(50, 50, 0x000000, 0x000000);
                gridHelper.material.transparent = true;
                gridHelper.material.opacity = 0.1;
                scene.add(gridHelper);

                // --- 根据用户绘制的线条动态生成 3D 墙体 ---
                const thickness = 0.15;
                const solidWallMat = new THREE.MeshStandardMaterial({ color: 0xe2e4e6, roughness: 0.85 });
                const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.4, roughness: 0.1 });
                
                walls.forEach(w => {
                    // 将 2D 像素坐标映射为 3D 空间坐标
                    const x1 = (w.x1 - originPos.x) / ppm;
                    const z1 = (w.y1 - originPos.y) / ppm;
                    const x2 = (w.x2 - originPos.x) / ppm;
                    const z2 = (w.y2 - originPos.y) / ppm;

                    const length = Math.hypot(x2 - x1, z2 - z1);
                    const angle = Math.atan2(x1 - x2, z1 - z2);
                    const cx = (x1 + x2) / 2;
                    const cz = (z1 + z2) / 2;

                    const createBox = (width, height, depth, yPos, material) => {
                        const geo = new THREE.BoxGeometry(width, height, depth);
                        const mesh = new THREE.Mesh(geo, material);
                        mesh.position.set(cx, yPos, cz);
                        mesh.rotation.y = angle;
                        mesh.castShadow = true;
                        mesh.receiveShadow = true;
                        scene.add(mesh);
                    };

                    if (w.type === 'solid') {
                        // 实体墙
                        createBox(thickness, wallHeight, length + thickness * 0.5, wallHeight / 2, solidWallMat);
                    } else if (w.type === 'window') {
                        // 窗户处理
                        const sillHeight = 0.9; // 离地窗台高 0.9m
                        const winHeight = 1.4;  // 窗户玻璃高 1.4m
                        
                        // 1. 下方窗台墙
                        createBox(thickness, sillHeight, length + thickness * 0.5, sillHeight / 2, solidWallMat);
                        
                        // 2. 上方横梁墙
                        const headerHeight = wallHeight - sillHeight - winHeight;
                        if (headerHeight > 0) {
                            createBox(thickness, headerHeight, length + thickness * 0.5, wallHeight - headerHeight / 2, solidWallMat);
                        }
                        
                        // 3. 中间玻璃
                        createBox(thickness * 0.2, winHeight, length, sillHeight + winHeight / 2, glassMat);
                    }
                });

                // 将 2D 家具映射到 3D 空间
                items.forEach(item => {
                    const x3d = (item.x - originPos.x) / ppm + item.w / 2;
                    const z3d = (item.y - originPos.y) / ppm + item.h / 2;

                    const itemGeo = new THREE.BoxGeometry(item.w, 0.75, item.h); 
                    const itemMat = new THREE.MeshStandardMaterial({ color: item.color });
                    const mesh = new THREE.Mesh(itemGeo, itemMat);
                    
                    mesh.position.set(x3d, 0.75 / 2, z3d);
                    mesh.rotation.y = -item.r * Math.PI / 180;
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    scene.add(mesh);
                });

                // 控制逻辑
                const moveState = { forward: false, backward: false, left: false, right: false };
                let isDragging = false, prevMouse = { x: 0, y: 0 }, yaw = 0, pitch = 0;

                const onDown = (e) => { isDragging = true; prevMouse = { x: e.clientX||e.touches[0].clientX, y: e.clientY||e.touches[0].clientY }; };
                const onUp = () => { isDragging = false; };
                const onMove = (e) => {
                    if (!isDragging) return;
                    const clientX = e.clientX||e.touches[0].clientX, clientY = e.clientY||e.touches[0].clientY;
                    yaw -= (clientX - prevMouse.x) * 0.004;
                    pitch -= (clientY - prevMouse.y) * 0.004;
                    pitch = Math.max(-Math.PI/2+0.1, Math.min(Math.PI/2-0.1, pitch));
                    camera.rotation.y = yaw; camera.rotation.x = pitch;
                    prevMouse = { x: clientX, y: clientY };
                };

                container.addEventListener('mousedown', onDown); document.addEventListener('mouseup', onUp); document.addEventListener('mousemove', onMove);
                container.addEventListener('touchstart', onDown, {passive: false}); document.addEventListener('touchend', onUp); document.addEventListener('touchmove', onMove, {passive: false});

                const onKeyDown = (e) => {
                    if(e.code==='KeyW') moveState.forward=true; if(e.code==='KeyS') moveState.backward=true;
                    if(e.code==='KeyA') moveState.left=true; if(e.code==='KeyD') moveState.right=true;
                };
                const onKeyUp = (e) => {
                    if(e.code==='KeyW') moveState.forward=false; if(e.code==='KeyS') moveState.backward=false;
                    if(e.code==='KeyA') moveState.left=false; if(e.code==='KeyD') moveState.right=false;
                };
                document.addEventListener('keydown', onKeyDown); document.addEventListener('keyup', onKeyUp);

                // 小地图绘制
                const drawMinimap = () => {
                    const canvas = minimapRef.current;
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.save();
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    const scale = 15; 
                    ctx.scale(scale, scale);
                    // 尝试让地图居中，简单抵消相机当前位置的一部分
                    ctx.translate(-camera.position.x * 0.5, -camera.position.z * 0.5);

                    // 画墙壁
                    walls.forEach(w => {
                        ctx.beginPath();
                        ctx.moveTo((w.x1 - originPos.x) / ppm, (w.y1 - originPos.y) / ppm);
                        ctx.lineTo((w.x2 - originPos.x) / ppm, (w.y2 - originPos.y) / ppm);
                        ctx.strokeStyle = w.type === 'window' ? '#60a5fa' : '#374151'; 
                        ctx.lineWidth = w.type === 'window' ? 0.08 : 0.15;
                        ctx.stroke();
                    });

                    // 画玩家红点
                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.arc(camera.position.x, camera.position.z, 0.3, 0, Math.PI * 2);
                    ctx.fill();

                    // 画视角方向
                    const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    ctx.beginPath();
                    ctx.moveTo(camera.position.x, camera.position.z);
                    ctx.lineTo(camera.position.x + dir.x * 2, camera.position.z + dir.z * 2);
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 0.1;
                    ctx.stroke();

                    ctx.restore();
                };

                let prevTime = performance.now();
                const animate = () => {
                    animationId = requestAnimationFrame(animate);
                    const time = performance.now();
                    const delta = (time - prevTime) / 1000;
                    prevTime = time;

                    const speed = 3.0 * delta;
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion); forward.y = 0; forward.normalize();
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion); right.y = 0; right.normalize();

                    if (moveState.forward) camera.position.add(forward.clone().multiplyScalar(speed));
                    if (moveState.backward) camera.position.add(forward.clone().multiplyScalar(-speed));
                    if (moveState.left) camera.position.add(right.clone().multiplyScalar(-speed));
                    if (moveState.right) camera.position.add(right.clone().multiplyScalar(speed));

                    renderer.render(scene, camera);
                    drawMinimap(); 
                };
                animate();

                const onResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', onResize);

                return () => {
                    cancelAnimationFrame(animationId);
                    document.removeEventListener('mouseup', onUp); document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('touchend', onUp); document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('keydown', onKeyDown); document.removeEventListener('keyup', onKeyUp);
                    window.removeEventListener('resize', onResize);
                    if (container) container.innerHTML = '';
                };
            }, [items, ppm, originPos, walls, wallHeight]); 

            return (
                <div className="relative w-full h-screen bg-black overflow-hidden">
                    <div ref={mountRef} className="absolute inset-0 cursor-move"></div>
                    <div id="crosshair"></div>
                    <div className="absolute top-0 left-0 w-full p-4 pointer-events-none flex justify-between items-start z-20">
                        <div className="flex flex-col gap-4">
                            <button onClick={onExit} className="pointer-events-auto bg-white/90 hover:bg-white text-gray-900 font-bold py-2 px-4 rounded-lg shadow-lg backdrop-blur flex items-center gap-2 transition transform hover:scale-105">
                                <span>🔙</span> 返回平面 2D
                            </button>
                            <div className="bg-black/60 text-white p-4 rounded-lg backdrop-blur border border-white/10 hidden md:block">
                                <h2 className="text-yellow-400 font-bold mb-1">🎮 操作说明</h2>
                                <p className="text-sm">鼠标拖拽：环顾四周</p>
                                <p className="text-sm">WASD键：移动漫游</p>
                            </div>
                        </div>
                        <div className="pointer-events-auto bg-white/90 p-2 rounded-xl shadow-2xl backdrop-blur border-2 border-white/50 flex flex-col items-center">
                            <span className="text-xs font-bold text-gray-600 mb-1">📡 实时雷达</span>
                            <canvas ref={minimapRef} width="180" height="180" className="bg-gray-100 rounded border border-gray-300"></canvas>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 主应用组件
        // ==========================================
        function App() {
            const [viewMode, setViewMode] = useState('2d'); 
            
            const [bgImage, setBgImage] = useState(null);
            const [imgSize, setImgSize] = useState({ w: 0, h: 0 });
            const [zoom, setZoom] = useState(1);
            const [ppm, setPpm] = useState(120); 
            const [originPos, setOriginPos] = useState({ x: 250, y: 250 });

            // 墙体放样相关状态
            const [wallHeight, setWallHeight] = useState(2.6);
            const [walls, setWalls] = useState([]); // {id, x1, y1, x2, y2, type: 'solid'|'window'}
            const [drawMode, setDrawMode] = useState('none'); // 'none', 'solid', 'window'
            const [tempLine, setTempLine] = useState(null);

            // 自定义家具配置状态
            const [customConfig, setCustomConfig] = useState({ name: '自定义物品', w: 1.0, h: 1.0, color: '#8b5cf6' });

            const [items, setItems] = useState([
                { id: 1, name: '办公桌', w: 1.8, h: 0.6, x: 400, y: 150, r: 0, color: '#d97706' },
            ]);
            const [selectedId, setSelectedId] = useState(null);
            
            // 添加自定义物品函数
            const addCustomItem = () => {
                setDrawMode('none');
                const nx = containerRef.current ? (containerRef.current.scrollLeft+150)/zoom : 100;
                const ny = containerRef.current ? (containerRef.current.scrollTop+150)/zoom : 100;
                setItems([...items, {id:Date.now(), name:customConfig.name||'未命名', w:Number(customConfig.w)||1, h:Number(customConfig.h)||1, x:nx, y:ny, r:0, color:customConfig.color||'#8b5cf6'}]);
            };

            const [draggingId, setDraggingId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });

            const [showRuler, setShowRuler] = useState(true);
            const [rulerLength, setRulerLength] = useState(3.03); 
            const [rulerState, setRulerState] = useState({ x: 40, y: 40, r: 0 }); 

            const containerRef = useRef(null);

            // 自动吸附逻辑：寻找距离小于 15 个逻辑像素的墙体端点
            const SNAP_DIST = 15;
            const getSnappedPoint = (x, y, currentWalls) => {
                for (let w of currentWalls) {
                    if (Math.hypot(w.x1 - x, w.y1 - y) < SNAP_DIST) return { x: w.x1, y: w.y1, snapped: true };
                    if (Math.hypot(w.x2 - x, w.y2 - y) < SNAP_DIST) return { x: w.x2, y: w.y2, snapped: true };
                }
                return { x, y, snapped: false };
            };

            const processImageSrc = (src) => {
                setBgImage(src);
                const img = new window.Image();
                img.onload = () => {
                    setImgSize({ w: img.width, h: img.height });
                    if (containerRef.current) {
                        const { clientWidth, clientHeight } = containerRef.current;
                        const scaleW = (clientWidth - 60) / img.width;
                        const scaleH = (clientHeight - 60) / img.height;
                        setZoom(Number(Math.min(scaleW, scaleH, 1).toFixed(2)));
                    }
                };
                img.src = src;
            };

            useEffect(() => {
                const handlePaste = (e) => {
                    if (viewMode !== '2d') return; 
                    const pasteItems = e.clipboardData?.items;
                    if (!pasteItems) return;
                    for (let i = 0; i < pasteItems.length; i++) {
                        if (pasteItems[i].type.indexOf('image') !== -1) {
                            const reader = new FileReader();
                            reader.onload = (ev) => processImageSrc(ev.target.result);
                            reader.readAsDataURL(pasteItems[i].getAsFile());
                        }
                    }
                };
                window.addEventListener('paste', handlePaste);
                return () => window.removeEventListener('paste', handlePaste);
            }, [viewMode]);

            // --- 鼠标交互事件 ---
            const handlePointerDown = (e, id, logicalX, logicalY) => {
                e.stopPropagation();
                const container = containerRef.current;
                const rect = container.getBoundingClientRect();
                const pointerLogicalX = (e.clientX - rect.left + container.scrollLeft) / zoom;
                const pointerLogicalY = (e.clientY - rect.top + container.scrollTop) / zoom;

                // 如果点击的是空白背景 且处于绘制模式
                if (id === null && drawMode !== 'none') {
                    const snapped = getSnappedPoint(pointerLogicalX, pointerLogicalY, walls);
                    setTempLine({ x1: snapped.x, y1: snapped.y, x2: snapped.x, y2: snapped.y });
                    return;
                }

                // 正常拖拽模式 (点击了物品/锚点/尺子)
                if (id !== null) {
                    if (drawMode !== 'none') {
                        setDrawMode('none'); // 自动退出绘制模式
                        setTempLine(null);
                    }
                    setDraggingId(id);
                    setSelectedId(id);
                    setDragOffset({ x: pointerLogicalX - logicalX, y: pointerLogicalY - logicalY });
                } else {
                    setSelectedId(null);
                }
            };

            const handlePointerMove = (e) => {
                const container = containerRef.current;
                const rect = container.getBoundingClientRect();
                const pointerLogicalX = (e.clientX - rect.left + container.scrollLeft) / zoom;
                const pointerLogicalY = (e.clientY - rect.top + container.scrollTop) / zoom;

                // 如果正在绘制
                if (drawMode !== 'none' && tempLine) {
                    let nx = pointerLogicalX;
                    let ny = pointerLogicalY;
                    
                    // 1. 优先检测端点自动吸附
                    const snapResult = getSnappedPoint(nx, ny, walls);
                    if (snapResult.snapped) {
                        nx = snapResult.x;
                        ny = snapResult.y;
                    } else {
                        // 2. 如果没有吸附到端点，则进行简单的正交吸附 (保持水平或垂直)
                        const dx = Math.abs(nx - tempLine.x1);
                        const dy = Math.abs(ny - tempLine.y1);
                        if (dx > dy * 2) ny = tempLine.y1;
                        else if (dy > dx * 2) nx = tempLine.x1;
                    }

                    setTempLine(prev => ({ ...prev, x2: nx, y2: ny }));
                    return;
                }

                if (draggingId === null) return;
                const newX = pointerLogicalX - dragOffset.x;
                const newY = pointerLogicalY - dragOffset.y;

                if (draggingId === 'ruler') {
                    setRulerState(prev => ({ ...prev, x: newX, y: newY }));
                } else if (draggingId === 'origin') {
                    setOriginPos({ x: newX, y: newY });
                } else {
                    setItems(items.map(item => item.id === draggingId ? { ...item, x: newX, y: newY } : item));
                }
            };

            const handlePointerUp = () => {
                // 如果在绘制状态松开鼠标
                if (drawMode !== 'none' && tempLine) {
                    const dist = Math.hypot(tempLine.x2 - tempLine.x1, tempLine.y2 - tempLine.y1);
                    if (dist > 10) { // 过滤掉无意的小点击
                        setWalls([...walls, { id: Date.now(), ...tempLine, type: drawMode }]);
                    }
                    setTempLine(null);
                    return;
                }
                setDraggingId(null);
            };

            useEffect(() => {
                window.addEventListener('pointerup', handlePointerUp);
                return () => window.removeEventListener('pointerup', handlePointerUp);
            });

            // --- 渲染逻辑 ---
            if (viewMode === '3d') {
                return <RoomViewer3D items={items} ppm={ppm} originPos={originPos} walls={walls} wallHeight={wallHeight} onExit={() => setViewMode('2d')} />;
            }

            return (
                <div className="flex flex-col md:flex-row h-screen w-screen overflow-hidden font-sans text-gray-800">
                    {/* 左侧控制面板 */}
                    <div className="w-full md:w-[360px] md:h-full h-1/2 flex-shrink-0 bg-white shadow-xl z-20 flex flex-col p-5 overflow-y-auto border-r border-gray-200">
                        <div className="flex justify-between items-center mb-4 border-b pb-3">
                            <h1 className="text-xl font-bold text-gray-900">户型设计与巡游</h1>
                            <button 
                                onClick={() => {
                                    if(walls.length === 0) alert("请先使用下方的【墙体放样】工具画出几堵墙，再进入 3D 巡游！");
                                    else setViewMode('3d');
                                }}
                                className="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-2 px-3 rounded-lg shadow-lg transform transition hover:scale-105 flex items-center gap-1 text-sm animate-pulse"
                            >
                                🚀 3D 巡游
                            </button>
                        </div>

                        {/* 第一步：基础设置 */}
                        <div className="mb-4 space-y-3">
                            <div>
                                <h2 className="text-sm font-semibold text-gray-700 mb-1">1. 导入平面图</h2>
                                <input type="file" accept="image/*" onChange={(e) => { if(e.target.files[0]) { const r = new FileReader(); r.onload=ev=>processImageSrc(ev.target.result); r.readAsDataURL(e.target.files[0]); } }}
                                    className="block w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-gray-100 hover:file:bg-gray-200" />
                            </div>
                            
                            <div className="bg-yellow-50 p-2 rounded border border-yellow-200">
                                <h2 className="text-sm font-semibold text-gray-700 flex justify-between items-center">
                                    <span>2. 对齐比例与原点</span>
                                    <label className="flex items-center space-x-1 text-xs cursor-pointer">
                                        <input type="checkbox" checked={showRuler} onChange={(e) => setShowRuler(e.target.checked)} /><span>显示尺</span>
                                    </label>
                                </h2>
                                <div className="flex gap-2 mt-2">
                                    <button onClick={() => setRulerState(p => ({...p, r: (p.r - 90) % 360}))} className="flex-1 bg-white border border-yellow-300 hover:bg-yellow-100 py-1 rounded text-xs text-yellow-700 transition cursor-pointer">↺ 转 90°</button>
                                    <button onClick={() => setRulerState(p => ({...p, r: (p.r + 90) % 360}))} className="flex-1 bg-white border border-yellow-300 hover:bg-yellow-100 py-1 rounded text-xs text-yellow-700 transition cursor-pointer">↻ 转 90°</button>
                                </div>
                                <div className="flex items-center gap-2 mt-2">
                                    <label className="text-xs text-yellow-800 whitespace-nowrap">尺子长度(m):</label>
                                    <input type="number" step="0.1" value={rulerLength} onChange={(e) => setRulerLength(Number(e.target.value))} className="w-full px-1 border rounded text-xs border-yellow-300 focus:outline-none focus:border-yellow-500" />
                                </div>
                                <input type="range" min="10" max="300" value={ppm} onChange={(e) => setPpm(Number(e.target.value))} className="w-full mt-2" />
                                <p className="text-[10px] text-gray-500 mt-1 leading-tight">请拖拽右侧红色📍靶心到墙角作为 3D 起点，并用黄色尺子校准像素比例。</p>
                            </div>
                        </div>

                        {/* 第二步：重磅新增 - 墙体放样 */}
                        <div className="mb-4 bg-blue-50 p-3 rounded-lg border border-blue-200">
                            <div className="flex justify-between items-center mb-2">
                                <h2 className="text-sm font-bold text-blue-800">3. 墙体放样 (描边)</h2>
                                <div className="flex items-center gap-1 text-xs">
                                    <label className="text-blue-700">层高(m):</label>
                                    <input type="number" step="0.1" value={wallHeight} onChange={(e)=>setWallHeight(Number(e.target.value))} className="w-12 px-1 border rounded" />
                                </div>
                            </div>
                            <p className="text-xs text-blue-600 mb-3 leading-tight">点击下方按钮，然后在图纸上沿着墙壁<b>按住并拖拽</b>画线。</p>
                            
                            <div className="flex gap-2 mb-2">
                                <button 
                                    onClick={() => setDrawMode(drawMode === 'solid' ? 'none' : 'solid')}
                                    className={`flex-1 py-2 rounded text-xs font-bold border ${drawMode === 'solid' ? 'bg-gray-800 text-white border-gray-800 shadow-inner' : 'bg-white text-gray-700 hover:bg-gray-100'}`}
                                >
                                    {drawMode === 'solid' ? '🔴 正在画: 实体墙' : '✏️ 画实体墙 (深灰)'}
                                </button>
                                <button 
                                    onClick={() => setDrawMode(drawMode === 'window' ? 'none' : 'window')}
                                    className={`flex-1 py-2 rounded text-xs font-bold border ${drawMode === 'window' ? 'bg-blue-500 text-white border-blue-500 shadow-inner' : 'bg-white text-blue-600 hover:bg-blue-50'}`}
                                >
                                    {drawMode === 'window' ? '🔴 正在画: 窗户' : '🪟 画窗户 (亮色)'}
                                </button>
                            </div>
                            
                            {walls.length > 0 && (
                                <div className="flex justify-between items-center mt-2 border-t border-blue-200 pt-2">
                                    <span className="text-xs text-blue-700">已画线段: {walls.length} 条</span>
                                    <button onClick={() => setWalls(walls.slice(0, -1))} className="text-xs text-red-500 hover:underline">撤销上一步</button>
                                </div>
                            )}
                        </div>

                        {/* 第三步：家具控制 */}
                        <div className="mb-4">
                            <h2 className="text-sm font-semibold text-gray-500 mb-2">4. 放置家具</h2>
                            <div className="grid grid-cols-2 gap-2">
                                {[{n:'桌子',w:1.8,h:0.6,c:'#d97706'}, {n:'双人床',w:1.5,h:2.0,c:'#be185d'}].map((o,i) => (
                                    <button key={i} onClick={() => {
                                        setDrawMode('none'); // 添加家具时自动退出绘制模式
                                        const nx = containerRef.current ? (containerRef.current.scrollLeft+150)/zoom : 100;
                                        const ny = containerRef.current ? (containerRef.current.scrollTop+150)/zoom : 100;
                                        setItems([...items, {id:Date.now(), name:o.n, w:o.w, h:o.h, x:nx, y:ny, r:0, color:o.c}]);
                                    }} className="bg-gray-50 border border-gray-200 hover:bg-gray-100 text-xs py-2 rounded shadow-sm">
                                        + {o.n}
                                    </button>
                                ))}
                            </div>
                            
                            {/* 自定义家具面板 */}
                            <div className="bg-purple-50 p-3 rounded-lg border border-purple-200 mt-3 shadow-sm">
                                <p className="text-sm font-medium mb-2 text-purple-800">✏️ 自定义家具</p>
                                <div className="grid grid-cols-2 gap-2 mb-2 text-xs">
                                    <div>
                                        <label className="block text-gray-600 mb-1">名称</label>
                                        <input type="text" value={customConfig.name} onChange={e => setCustomConfig({...customConfig, name: e.target.value})} className="w-full border border-gray-300 rounded px-2 py-1 outline-none focus:border-purple-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-600 mb-1">颜色</label>
                                        <input type="color" value={customConfig.color} onChange={e => setCustomConfig({...customConfig, color: e.target.value})} className="w-full h-[26px] border border-gray-300 rounded px-1 py-0 cursor-pointer bg-white" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-600 mb-1">宽 (m)</label>
                                        <input type="number" step="0.1" min="0.1" value={customConfig.w} onChange={e => setCustomConfig({...customConfig, w: e.target.value})} className="w-full border border-gray-300 rounded px-2 py-1 outline-none focus:border-purple-500" />
                                    </div>
                                    <div>
                                        <label className="block text-gray-600 mb-1">长 (m)</label>
                                        <input type="number" step="0.1" min="0.1" value={customConfig.h} onChange={e => setCustomConfig({...customConfig, h: e.target.value})} className="w-full border border-gray-300 rounded px-2 py-1 outline-none focus:border-purple-500" />
                                    </div>
                                </div>
                                <button onClick={addCustomItem} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-1.5 rounded text-sm transition shadow-sm cursor-pointer">
                                    ➕ 添加自定义家具
                                </button>
                            </div>
                        </div>

                        {/* 选中家具编辑 */}
                        {selectedId && selectedId !== 'ruler' && selectedId !== 'origin' && drawMode === 'none' && (
                            <div className="bg-gray-50 p-3 rounded-lg border border-gray-200 mt-auto">
                                <p className="text-xs font-bold mb-2">编辑选中家具</p>
                                <div className="flex gap-2 mb-2">
                                    <button onClick={() => setItems(items.map(i=>i.id===selectedId?{...i, r:(i.r-90)%360}:i))} className="flex-1 bg-white border py-1 rounded text-xs">↺ 转</button>
                                    <button onClick={() => setItems(items.map(i=>i.id===selectedId?{...i, r:(i.r+90)%360}:i))} className="flex-1 bg-white border py-1 rounded text-xs">↻ 转</button>
                                </div>
                                <button onClick={() => {setItems(items.filter(i=>i.id!==selectedId)); setSelectedId(null);}} className="w-full bg-red-100 text-red-600 py-1 rounded text-xs">删除</button>
                            </div>
                        )}
                    </div>

                    {/* 右侧画布区域 */}
                    <div 
                        className={`flex-1 relative overflow-auto grid-bg-dynamic ${drawMode !== 'none' ? 'cursor-crosshair' : 'cursor-default'} no-scrollbar touch-none`}
                        ref={containerRef}
                        onPointerMove={handlePointerMove}
                        onPointerDown={(e) => handlePointerDown(e, null, 0, 0)} // 用于捕捉画布空白处的点击绘制
                        style={{ backgroundSize: `${20 * zoom}px ${20 * zoom}px` }} 
                    >
                        {/* 缩放控制 */}
                        <div className="fixed md:absolute bottom-6 right-6 flex items-center bg-white shadow-xl rounded-lg border z-50 text-sm">
                            <button onClick={() => setZoom(z => Math.max(0.1, Number((z - 0.1).toFixed(2))))} className="px-3 py-2 border-r">➖</button>
                            <span className="px-4 py-2 min-w-[4rem] text-center">{Math.round(zoom * 100)}%</span>
                            <button onClick={() => setZoom(z => Math.min(5, Number((z + 0.1).toFixed(2))))} className="px-3 py-2 border-l">➕</button>
                        </div>

                        {!bgImage && <div className="absolute inset-0 flex items-center justify-center text-gray-400 font-medium z-0">请在左侧上传或直接 Ctrl+V 粘贴平面图</div>}

                        {bgImage && (
                            <img src={bgImage} className="absolute top-0 left-0 pointer-events-none origin-top-left shadow-lg"
                                style={{ width: imgSize.w ? `${imgSize.w * zoom}px` : 'auto', height: imgSize.h ? `${imgSize.h * zoom}px` : 'auto', zIndex: 0 }}
                            />
                        )}

                        {/* --- 绘制的墙体和窗户 SVG 叠层 --- */}
                        <svg className="absolute top-0 left-0 pointer-events-none" style={{ width: '10000px', height: '10000px', zIndex: 5 }}>
                            {walls.map(w => (
                                <line key={w.id} 
                                    x1={w.x1 * zoom} y1={w.y1 * zoom} 
                                    x2={w.x2 * zoom} y2={w.y2 * zoom}
                                    stroke={w.type === 'window' ? '#3b82f6' : '#1f2937'} 
                                    strokeWidth={28 * zoom} 
                                    strokeLinecap="round" 
                                    opacity={w.type === 'window' ? 0.7 : 0.9}
                                />
                            ))}
                            {/* 正在拖拽预览的线段 */}
                            {tempLine && (
                                <line 
                                    x1={tempLine.x1 * zoom} y1={tempLine.y1 * zoom} 
                                    x2={tempLine.x2 * zoom} y2={tempLine.y2 * zoom}
                                    stroke={drawMode === 'window' ? '#3b82f6' : '#1f2937'} 
                                    strokeWidth={28 * zoom} 
                                    strokeDasharray="8 8"
                                    strokeLinecap="round" 
                                />
                            )}
                        </svg>

                        {/* 3D 坐标系原点 (核心锚点) */}
                        <div 
                            className="absolute flex flex-col items-center justify-center z-50 cursor-move drop-shadow-xl"
                            style={{ left: `${originPos.x * zoom}px`, top: `${originPos.y * zoom}px`, transform: 'translate(-50%, -50%)', touchAction: 'none' }}
                            onPointerDown={(e) => handlePointerDown(e, 'origin', originPos.x, originPos.y)}
                        >
                            <div className={`w-8 h-8 rounded-full border-4 border-red-600 bg-red-500/50 flex items-center justify-center animate-bounce ${selectedId==='origin'?'ring-4 ring-red-300':''}`}>
                                <div className="w-2 h-2 bg-white rounded-full"></div>
                            </div>
                            <span className="mt-1 bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full whitespace-nowrap pointer-events-none font-bold">
                                📍 起点锚点
                            </span>
                        </div>

                        {/* 比例尺 */}
                        {showRuler && (
                            <div className={`absolute bg-yellow-400/80 border-2 border-yellow-600 shadow-md z-40 cursor-move ${selectedId==='ruler'?'ring-2 ring-yellow-400':''}`}
                                style={{ width: `${rulerLength * ppm * zoom}px`, height: '8px', left: `${rulerState.x * zoom}px`, top: `${rulerState.y * zoom}px`, transform: `rotate(${rulerState.r}deg)`, borderRadius: '4px', touchAction: 'none' }}
                                onPointerDown={(e) => handlePointerDown(e, 'ruler', rulerState.x, rulerState.y)}
                            >
                                <span className="absolute whitespace-nowrap bg-white text-yellow-700 px-1 rounded shadow text-[10px] pointer-events-none" style={{ top: '-20px', transform: `rotate(${-rulerState.r}deg)` }}>
                                    尺子：{rulerLength}m
                                </span>
                            </div>
                        )}

                        {/* 家具 */}
                        {items.map(item => (
                            <div key={item.id} className="absolute flex flex-col items-center justify-center cursor-move select-none transition-shadow"
                                style={{
                                    width: `${item.w * ppm * zoom}px`, height: `${item.h * ppm * zoom}px`,
                                    left: `${item.x * zoom}px`, top: `${item.y * zoom}px`, transform: `rotate(${item.r}deg)`,
                                    backgroundColor: `${item.color}ee`, 
                                    border: item.id === selectedId ? '3px solid #000' : '2px solid rgba(0,0,0,0.5)',
                                    boxShadow: item.id === selectedId ? '0 10px 20px -5px rgba(0,0,0,0.5)' : '0 4px 6px -1px rgba(0,0,0,0.3)',
                                    zIndex: item.id === selectedId ? 30 : 10, borderRadius: '4px', touchAction: 'none'
                                }}
                                onPointerDown={(e) => handlePointerDown(e, item.id, item.x, item.y)}
                            >
                                <div className="flex flex-col items-center justify-center w-full h-full pointer-events-none" style={{ transform: `scale(${Math.min(zoom, 1)})` }}>
                                    <span className="text-white font-bold drop-shadow-md text-sm text-center leading-tight">
                                        {item.name}<br/><span className="text-xs opacity-80">{item.w}m x {item.h}m</span>
                                    </span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
