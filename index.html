<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>家具摆放规划器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f3f4f6; touch-action: none; }
        .grid-bg-dynamic {
            background-image: linear-gradient(to right, #e5e7eb 1px, transparent 1px),
                              linear-gradient(to bottom, #e5e7eb 1px, transparent 1px);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 20px; height: 20px;
            transform: translate(-50%, -50%); pointer-events: none; opacity: 0.8; z-index: 10;
        }
        #crosshair::before, #crosshair::after { content: ''; position: absolute; background: white; box-shadow: 0 0 2px rgba(0,0,0,0.5); }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }
        .cursor-drawing { cursor: crosshair !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 3D 视图组件
        // ==========================================
        const RoomViewer3D = ({ items, ppm, originPos, walls, wallHeight, wallThickness, onUpdateWall, onUpdateWindowWidth, onUpdateItem, onExit }) => {
            const mountRef = useRef(null);
            const minimapRef = useRef(null);
            
            // 核心：统一管理当前选中的 3D 物体 (窗户或家具)
            const [selectedObj, setSelectedObj] = useState(null); // { id: 123, type: 'window' | 'furniture' }

            const cameraStateRef = useRef({ x: 0, y: 1.6, z: 0, yaw: 0, pitch: 0 });

            useEffect(() => {
                let animationId;
                const container = mountRef.current;

                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0xf0f4f8);
                scene.fog = new THREE.Fog(0xf0f4f8, 2, 20);

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.set(cameraStateRef.current.x, cameraStateRef.current.y, cameraStateRef.current.z); 
                camera.rotation.order = 'YXZ';

                const renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                container.appendChild(renderer.domElement);

                scene.add(new THREE.AmbientLight(0xffffff, 0.6));
                const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.4);
                hemiLight.position.set(0, wallHeight, 0); 
                scene.add(hemiLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
                dirLight.position.set(5, wallHeight, 5); 
                dirLight.castShadow = true;
                scene.add(dirLight);

                const floorGeo = new THREE.PlaneGeometry(100, 100);
                const floorMat = new THREE.MeshStandardMaterial({ color: 0x7a7c7f, roughness: 0.95, metalness: 0.05 });
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                scene.add(floor);
                
                const ceilingGeo = new THREE.PlaneGeometry(100, 100);
                const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.9, side: THREE.FrontSide });
                const ceiling = new THREE.Mesh(ceilingGeo, ceilingMat);
                ceiling.rotation.x = Math.PI / 2; 
                ceiling.position.y = wallHeight;
                ceiling.receiveShadow = true;
                scene.add(ceiling);
                
                const gridHelper = new THREE.GridHelper(100, 100, 0x000000, 0x000000);
                gridHelper.material.transparent = true;
                gridHelper.material.opacity = 0.08;
                scene.add(gridHelper);

                // 构建 3D 墙体
                const thickness = wallThickness; 
                const solidWallMat = new THREE.MeshStandardMaterial({ color: 0xe2e4e6, roughness: 0.85 });
                const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.4, roughness: 0.1 });
                const selectedGlassMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, transparent: true, opacity: 0.7, roughness: 0.1, emissive: 0x664400 }); 
                
                const interactableWindows = []; 
                const interactableFurniture = []; // 新增：可交互家具的物理碰撞盒集合

                walls.forEach(w => {
                    const x1 = (w.x1 - originPos.x) / ppm;
                    const z1 = (w.y1 - originPos.y) / ppm;
                    const x2 = (w.x2 - originPos.x) / ppm;
                    const z2 = (w.y2 - originPos.y) / ppm;

                    const length = Math.hypot(x2 - x1, z2 - z1);
                    const angle = Math.atan2(x1 - x2, z1 - z2);
                    const cx = (x1 + x2) / 2;
                    const cz = (z1 + z2) / 2;

                    const createBox = (width, height, depth, yPos, material) => {
                        const geo = new THREE.BoxGeometry(width, height, depth);
                        const mesh = new THREE.Mesh(geo, material);
                        mesh.position.set(cx, yPos, cz);
                        mesh.rotation.y = angle;
                        mesh.castShadow = true;
                        mesh.receiveShadow = true;
                        scene.add(mesh);
                        return mesh;
                    };

                    if (w.type === 'solid') {
                        createBox(thickness, wallHeight, length + thickness, wallHeight / 2, solidWallMat);
                    } else if (w.type === 'window') {
                        const sillHeight = w.sillHeight !== undefined ? w.sillHeight : 0.9; 
                        const winHeight = w.winHeight !== undefined ? w.winHeight : 1.4;  
                        createBox(thickness, sillHeight, length + thickness, sillHeight / 2, solidWallMat);
                        const headerHeight = wallHeight - sillHeight - winHeight;
                        if (headerHeight > 0) {
                            createBox(thickness, headerHeight, length + thickness, wallHeight - headerHeight / 2, solidWallMat);
                        }
                        const isSelected = selectedObj?.type === 'window' && selectedObj.id === w.id;
                        const glassMesh = createBox(thickness * 0.2, winHeight, length, sillHeight + winHeight / 2, isSelected ? selectedGlassMat : glassMat);
                        glassMesh.userData = { id: w.id, type: 'window' };
                        interactableWindows.push(glassMesh);
                    }
                });

                // --- 核心功能：全新参数化真实家具模型库 ---
                const createProceduralFurniture = (item, isSelected) => {
                    const group = new THREE.Group();
                    group.userData = { id: item.id, type: 'furniture' }; // 绑定数据供射线检测

                    const baseColor = item.color || '#cccccc';
                    // 选中状态产生发光效果 (Emissive)
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: baseColor, 
                        roughness: 0.8,
                        emissive: isSelected ? 0x444444 : 0x000000 
                    });
                    
                    const w = item.w, h = item.h, d = item.d || 0.75; 

                    const addPart = (bw, bh, bd, bx, by, bz, m = mat) => {
                        const geo = new THREE.BoxGeometry(bw, bh, bd);
                        const mesh = new THREE.Mesh(geo, m);
                        mesh.position.set(bx, by, bz);
                        mesh.castShadow = true;
                        mesh.receiveShadow = true;
                        group.add(mesh);
                    };

                    switch (item.type) {
                        case 'table':
                            addPart(w, 0.05, h, 0, d - 0.025, 0); // 桌面
                            addPart(0.05, d - 0.05, 0.05, -w/2+0.05, (d-0.05)/2, -h/2+0.05); // 四条腿
                            addPart(0.05, d - 0.05, 0.05, w/2-0.05, (d-0.05)/2, -h/2+0.05);
                            addPart(0.05, d - 0.05, 0.05, -w/2+0.05, (d-0.05)/2, h/2-0.05);
                            addPart(0.05, d - 0.05, 0.05, w/2-0.05, (d-0.05)/2, h/2-0.05);
                            break;
                        case 'chair':
                            const seatH = d * 0.45;
                            addPart(w, 0.05, h, 0, seatH, 0); // 坐垫
                            addPart(0.04, seatH, 0.04, -w/2+0.04, seatH/2, -h/2+0.04); // 腿
                            addPart(0.04, seatH, 0.04, w/2-0.04, seatH/2, -h/2+0.04);
                            addPart(0.04, seatH, 0.04, -w/2+0.04, seatH/2, h/2-0.04);
                            addPart(0.04, seatH, 0.04, w/2-0.04, seatH/2, h/2-0.04);
                            addPart(w, d - seatH, 0.04, 0, seatH + (d - seatH)/2, -h/2+0.02); // 靠背
                            break;
                        case 'bed':
                            addPart(w, 0.2, h, 0, 0.1, 0); // 床架
                            const mattressMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9, emissive: isSelected ? 0x222222 : 0 });
                            addPart(w-0.1, 0.15, h-0.1, 0, 0.2 + 0.075, 0, mattressMat); // 床垫
                            addPart(w, d, 0.1, 0, d/2, -h/2+0.05); // 床头板
                            break;
                        case 'rack':
                            addPart(0.04, d, 0.04, -w/2+0.02, d/2, -h/2+0.02); // 四根立柱
                            addPart(0.04, d, 0.04, w/2-0.02, d/2, -h/2+0.02);
                            addPart(0.04, d, 0.04, -w/2+0.02, d/2, h/2-0.02);
                            addPart(0.04, d, 0.04, w/2-0.02, d/2, h/2-0.02);
                            const shelves = Math.max(2, Math.floor(d / 0.4)); 
                            for(let i=0; i<shelves; i++) {
                                addPart(w, 0.02, h, 0, (d/(shelves-1))*i || 0.05, 0); // 层板
                            }
                            break;
                        case 'toilet': // 真实马桶构造
                            addPart(w * 0.6, d * 0.45, h * 0.6, 0, d * 0.45 / 2, h * 0.2); // 底座
                            addPart(w * 0.8, d * 0.55, h * 0.4, 0, d * 0.45 + d * 0.55 / 2, -h * 0.3); // 水箱
                            addPart(w * 0.6, 0.05, h * 0.6, 0, d * 0.45 + 0.025, h * 0.2); // 盖板
                            break;
                        case 'basin': // 洗手盆带半身镜
                            addPart(w, d * 0.85, h, 0, d * 0.85 / 2, 0); // 底部地柜
                            const topMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, emissive: isSelected ? 0x444444 : 0 });
                            addPart(w * 1.05, 0.05, h * 1.05, 0, d * 0.85 + 0.025, 0, topMat); // 洗手台面
                            // 将之前的黑色高反光镜面，改为淡蓝色玻璃质感
                            const mirrorMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, roughness: 0.1, metalness: 0.3, transparent: true, opacity: 0.8 });
                            addPart(w * 0.9, d * 0.6, 0.02, 0, d * 0.85 + 0.05 + d * 0.3, -h / 2 + 0.01, mirrorMat); // 墙上镜子
                            break;
                        case 'cabinet':
                        case 'wardrobe': // 橱柜与大衣柜
                            addPart(w, d, h, 0, d / 2, 0); // 柜体主块
                            const counterMat = new THREE.MeshStandardMaterial({ color: 0xf3f4f6, roughness: 0.4, emissive: isSelected ? 0x333333 : 0 });
                            addPart(w * 1.02, 0.05, h * 1.02, 0, d + 0.025, 0, counterMat); // 稍微溢出的台面或顶板
                            break;
                        case 'light':
                            const lightGeo = new THREE.CylinderGeometry(w/2, w/2, 0.05, 16);
                            const lightMat = new THREE.MeshBasicMaterial({ color: isSelected ? 0xffaaaa : 0xfffae6 });
                            const lightMesh = new THREE.Mesh(lightGeo, lightMat);
                            group.add(lightMesh);
                            break;
                        default:
                            addPart(w, d, h, 0, d/2, 0); // 基础方块
                            break;
                    }
                    return group;
                };

                // 遍历放置家具
                items.forEach(item => {
                    const x3d = (item.x - originPos.x) / ppm + item.w / 2;
                    const z3d = (item.y - originPos.y) / ppm + item.h / 2;
                    
                    let yElev = item.elevation !== undefined ? item.elevation : 0;
                    if (item.type === 'light' && item.elevation === undefined) yElev = wallHeight - 0.025;

                    const isSelected = selectedObj?.type === 'furniture' && selectedObj.id === item.id;
                    const furnitureGroup = createProceduralFurniture(item, isSelected);
                    
                    furnitureGroup.position.set(x3d, yElev, z3d); 
                    furnitureGroup.rotation.y = -item.r * Math.PI / 180; 
                    scene.add(furnitureGroup);
                    interactableFurniture.push(furnitureGroup); // 加入检测列表

                    // 如果是灯，额外生成真实点光源
                    if (item.type === 'light') {
                        const pLight = new THREE.PointLight(0xfffae6, 0.6, 12);
                        pLight.position.set(x3d, yElev - 0.2, z3d);
                        pLight.castShadow = true;
                        scene.add(pLight);
                    }
                });

                // 控制与交互逻辑
                const moveState = { forward: false, backward: false, left: false, right: false };
                let isDragging = false, prevMouse = { x: 0, y: 0 };
                let yaw = cameraStateRef.current.yaw;
                let pitch = cameraStateRef.current.pitch;
                camera.rotation.y = yaw; 
                camera.rotation.x = pitch;
                
                let clickStartX = 0, clickStartY = 0;
                const raycaster = new THREE.Raycaster();
                const mouse = new THREE.Vector2();

                const onDown = (e) => { 
                    isDragging = true; 
                    clickStartX = e.clientX||e.touches?.[0].clientX;
                    clickStartY = e.clientY||e.touches?.[0].clientY;
                    prevMouse = { x: clickStartX, y: clickStartY }; 
                };
                
                // --- 射线拾取：检测点中的是窗户还是家具 ---
                const onUp = (e) => { 
                    isDragging = false; 
                    const currentX = e.clientX || (e.changedTouches ? e.changedTouches[0].clientX : clickStartX);
                    const currentY = e.clientY || (e.changedTouches ? e.changedTouches[0].clientY : clickStartY);
                    
                    if (Math.abs(currentX - clickStartX) < 10 && Math.abs(currentY - clickStartY) < 10) {
                        mouse.x = (currentX / window.innerWidth) * 2 - 1;
                        mouse.y = -(currentY / window.innerHeight) * 2 + 1;
                        raycaster.setFromCamera(mouse, camera);
                        
                        const intersectsWindows = raycaster.intersectObjects(interactableWindows);
                        const intersectsFurniture = raycaster.intersectObjects(interactableFurniture, true);

                        let closest = null;
                        let minDist = Infinity;

                        if (intersectsWindows.length > 0) {
                            closest = { id: intersectsWindows[0].object.userData.id, type: 'window' };
                            minDist = intersectsWindows[0].distance;
                        }

                        if (intersectsFurniture.length > 0 && intersectsFurniture[0].distance < minDist) {
                            let obj = intersectsFurniture[0].object;
                            while(obj && !obj.userData?.id) obj = obj.parent; // 向上查找包裹了 id 的 Group
                            if (obj && obj.userData?.id) {
                                closest = { id: obj.userData.id, type: 'furniture' };
                            }
                        }

                        if (closest) setSelectedObj(closest);
                    }
                };
                
                const onMove = (e) => {
                    if (!isDragging) return;
                    const clientX = e.clientX||e.touches?.[0].clientX, clientY = e.clientY||e.touches?.[0].clientY;
                    yaw -= (clientX - prevMouse.x) * 0.004;
                    pitch -= (clientY - prevMouse.y) * 0.004;
                    pitch = Math.max(-Math.PI/2+0.1, Math.min(Math.PI/2-0.1, pitch));
                    camera.rotation.y = yaw; camera.rotation.x = pitch;
                    prevMouse = { x: clientX, y: clientY };
                    cameraStateRef.current.yaw = yaw;
                    cameraStateRef.current.pitch = pitch;
                };

                container.addEventListener('mousedown', onDown); document.addEventListener('mouseup', onUp); document.addEventListener('mousemove', onMove);
                container.addEventListener('touchstart', onDown, {passive: false}); document.addEventListener('touchend', onUp); document.addEventListener('touchmove', onMove, {passive: false});

                const onKeyDown = (e) => {
                    if(e.code==='KeyW') moveState.forward=true; if(e.code==='KeyS') moveState.backward=true;
                    if(e.code==='KeyA') moveState.left=true; if(e.code==='KeyD') moveState.right=true;
                };
                const onKeyUp = (e) => {
                    if(e.code==='KeyW') moveState.forward=false; if(e.code==='KeyS') moveState.backward=false;
                    if(e.code==='KeyA') moveState.left=false; if(e.code==='KeyD') moveState.right=false;
                };
                document.addEventListener('keydown', onKeyDown); document.addEventListener('keyup', onKeyUp);

                const drawMinimap = () => {
                    const canvas = minimapRef.current;
                    if (!canvas) return;
                    const ctx = canvas.getContext('2d');
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.save();
                    ctx.translate(canvas.width / 2, canvas.height / 2);
                    const scale = 15; 
                    ctx.scale(scale, scale);
                    ctx.translate(-camera.position.x * 0.5, -camera.position.z * 0.5);

                    walls.forEach(w => {
                        ctx.beginPath();
                        ctx.moveTo((w.x1 - originPos.x) / ppm, (w.y1 - originPos.y) / ppm);
                        ctx.lineTo((w.x2 - originPos.x) / ppm, (w.y2 - originPos.y) / ppm);
                        if (selectedObj?.type === 'window' && w.id === selectedObj.id) { ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 0.25; } 
                        else { ctx.strokeStyle = w.type === 'window' ? '#60a5fa' : '#374151'; ctx.lineWidth = w.type === 'window' ? 0.08 : 0.15; }
                        ctx.stroke();
                    });

                    ctx.fillStyle = '#ef4444';
                    ctx.beginPath();
                    ctx.arc(camera.position.x, camera.position.z, 0.3, 0, Math.PI * 2);
                    ctx.fill();

                    const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                    ctx.beginPath();
                    ctx.moveTo(camera.position.x, camera.position.z);
                    ctx.lineTo(camera.position.x + dir.x * 2, camera.position.z + dir.z * 2);
                    ctx.strokeStyle = '#ef4444';
                    ctx.lineWidth = 0.1;
                    ctx.stroke();

                    ctx.restore();
                };

                let prevTime = performance.now();
                const animate = () => {
                    animationId = requestAnimationFrame(animate);
                    const time = performance.now();
                    const delta = (time - prevTime) / 1000;
                    prevTime = time;

                    const speed = 3.0 * delta;
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion); forward.y = 0; forward.normalize();
                    const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion); right.y = 0; right.normalize();

                    if (moveState.forward) camera.position.add(forward.clone().multiplyScalar(speed));
                    if (moveState.backward) camera.position.add(forward.clone().multiplyScalar(-speed));
                    if (moveState.left) camera.position.add(right.clone().multiplyScalar(-speed));
                    if (moveState.right) camera.position.add(right.clone().multiplyScalar(speed));

                    cameraStateRef.current.x = camera.position.x;
                    cameraStateRef.current.y = camera.position.y;
                    cameraStateRef.current.z = camera.position.z;

                    renderer.render(scene, camera);
                    drawMinimap(); 
                };
                animate();

                const onResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', onResize);

                return () => {
                    cancelAnimationFrame(animationId);
                    document.removeEventListener('mouseup', onUp); document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('touchend', onUp); document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('keydown', onKeyDown); document.removeEventListener('keyup', onKeyUp);
                    window.removeEventListener('resize', onResize);
                    if (container) container.innerHTML = '';
                };
            }, [items, ppm, originPos, walls, wallHeight, wallThickness, selectedObj]);

            // 根据选中的 ID 映射出对应的数据对象
            const activeWin = selectedObj?.type === 'window' ? walls.find(w => w.id === selectedObj.id) : null;
            const activeFurn = selectedObj?.type === 'furniture' ? items.find(i => i.id === selectedObj.id) : null;

            return (
                <div className="relative w-full h-screen bg-black overflow-hidden">
                    <div ref={mountRef} className="absolute inset-0 cursor-move"></div>
                    <div id="crosshair"></div>
                    <div className="absolute top-0 left-0 w-full p-4 pointer-events-none flex justify-between items-start z-20">
                        <div className="flex flex-col gap-4">
                            <button onClick={onExit} className="pointer-events-auto bg-white/90 hover:bg-white text-gray-900 font-bold py-2 px-4 rounded-lg shadow-lg backdrop-blur flex items-center gap-2 transition transform hover:scale-105">
                                <span>🔙</span> 返回平面 2D
                            </button>
                            <div className="bg-black/60 text-white p-4 rounded-lg backdrop-blur border border-white/10 hidden md:block">
                                <h2 className="text-yellow-400 font-bold mb-1">🎮 操作说明</h2>
                                <p className="text-sm">鼠标拖拽：环顾四周，WASD键：移动</p>
                                <p className="text-sm mt-2 text-yellow-200 opacity-90">✨ 鼠标直接点击窗户/家具即可调整高度宽度</p>
                            </div>
                        </div>
                        <div className="pointer-events-auto bg-white/90 p-2 rounded-xl shadow-2xl backdrop-blur border-2 border-white/50 flex flex-col items-center">
                            <span className="text-xs font-bold text-gray-600 mb-1">📡 实时雷达</span>
                            <canvas ref={minimapRef} width="180" height="180" className="bg-gray-100 rounded border border-gray-300"></canvas>
                        </div>
                    </div>

                    {/* --- 面板 1：窗户调节面板 --- */}
                    {activeWin && (
                        <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 bg-white/95 p-5 rounded-2xl shadow-2xl backdrop-blur-md border border-amber-200 z-30 w-[90%] max-w-2xl pointer-events-auto transition-all">
                            <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-2">
                                <h3 className="font-bold text-gray-800 flex items-center gap-2"><span className="text-xl">🪟</span> 窗户调节 (自动修补墙体)</h3>
                                <button onClick={() => setSelectedObj(null)} className="text-gray-400 hover:text-red-500 font-bold text-2xl leading-none">&times;</button>
                            </div>
                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                                <div>
                                    <div className="flex justify-between text-xs mb-1 text-gray-700"><label className="font-medium">离地高度 (窗台)</label><span className="font-bold text-amber-600">{(activeWin.sillHeight !== undefined ? activeWin.sillHeight : 0.9).toFixed(2)} m</span></div>
                                    <input type="range" min="0" max={wallHeight - 0.2} step="0.05" value={activeWin.sillHeight !== undefined ? activeWin.sillHeight : 0.9} onChange={(e) => onUpdateWall(activeWin.id, { sillHeight: Number(e.target.value), winHeight: Math.min((activeWin.winHeight !== undefined ? activeWin.winHeight : 1.4), wallHeight - Number(e.target.value)) })} className="w-full accent-amber-500" />
                                </div>
                                <div>
                                    <div className="flex justify-between text-xs mb-1 text-gray-700"><label className="font-medium">窗自身高度</label><span className="font-bold text-blue-600">{(activeWin.winHeight !== undefined ? activeWin.winHeight : 1.4).toFixed(2)} m</span></div>
                                    <input type="range" min="0.2" max={wallHeight} step="0.05" value={activeWin.winHeight !== undefined ? activeWin.winHeight : 1.4} onChange={(e) => onUpdateWall(activeWin.id, { sillHeight: Math.min((activeWin.sillHeight !== undefined ? activeWin.sillHeight : 0.9), wallHeight - Number(e.target.value)), winHeight: Number(e.target.value) })} className="w-full accent-blue-500" />
                                </div>
                                <div>
                                    <div className="flex justify-between text-xs mb-1 text-gray-700"><label className="font-medium">窗洞宽度 (挖墙)</label><span className="font-bold text-green-600">{(Math.hypot(activeWin.x2 - activeWin.x1, activeWin.y2 - activeWin.y1) / ppm).toFixed(2)} m</span></div>
                                    <input type="range" min="0.2" max="5" step="0.05" value={Math.hypot(activeWin.x2 - activeWin.x1, activeWin.y2 - activeWin.y1) / ppm} onChange={(e) => onUpdateWindowWidth(activeWin.id, Number(e.target.value) * ppm)} className="w-full accent-green-500" />
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- 面板 2：家具调节面板 --- */}
                    {activeFurn && (
                        <div className="absolute bottom-8 left-1/2 transform -translate-x-1/2 bg-white/95 p-5 rounded-2xl shadow-2xl backdrop-blur-md border border-purple-200 z-30 w-[90%] max-w-2xl pointer-events-auto transition-all">
                            <div className="flex justify-between items-center mb-4 border-b border-gray-100 pb-2">
                                <h3 className="font-bold text-gray-800 flex items-center gap-2"><span className="text-xl">🛋️</span> 家具位置与高度调节</h3>
                                <button onClick={() => setSelectedObj(null)} className="text-gray-400 hover:text-red-500 font-bold text-2xl leading-none">&times;</button>
                            </div>
                            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                                <div>
                                    <div className="flex justify-between text-xs mb-1 text-gray-700"><label className="font-medium">离地悬空 (Z)</label><span className="font-bold text-purple-600">{(activeFurn.elevation || 0).toFixed(2)} m</span></div>
                                    <input type="range" min="0" max={wallHeight} step="0.05" value={activeFurn.elevation || 0} onChange={(e) => onUpdateItem(activeFurn.id, {elevation: Number(e.target.value)})} className="w-full accent-purple-500" />
                                </div>
                                <div>
                                    <div className="flex justify-between text-xs mb-1 text-gray-700"><label className="font-medium">自身高度</label><span className="font-bold text-indigo-600">{(activeFurn.d || 0.75).toFixed(2)} m</span></div>
                                    <input type="range" min="0.1" max={wallHeight} step="0.05" value={activeFurn.d || 0.75} onChange={(e) => onUpdateItem(activeFurn.id, {d: Number(e.target.value)})} className="w-full accent-indigo-500" />
                                </div>
                                <div>
                                    <div className="flex justify-between text-xs mb-1 text-gray-700"><label className="font-medium">左右微调 (X)</label><span className="font-bold text-gray-500">平移</span></div>
                                    <input type="range" min={activeFurn.x - 50} max={activeFurn.x + 50} step="2" value={activeFurn.x} onChange={(e) => onUpdateItem(activeFurn.id, {x: Number(e.target.value)})} className="w-full accent-gray-500" />
                                </div>
                                <div>
                                    <div className="flex justify-between text-xs mb-1 text-gray-700"><label className="font-medium">前后微调 (Y)</label><span className="font-bold text-gray-500">平移</span></div>
                                    <input type="range" min={activeFurn.y - 50} max={activeFurn.y + 50} step="2" value={activeFurn.y} onChange={(e) => onUpdateItem(activeFurn.id, {y: Number(e.target.value)})} className="w-full accent-gray-500" />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // 主应用组件
        // ==========================================
        function App() {
            const [viewMode, setViewMode] = useState('2d'); 
            
            const [bgImage, setBgImage] = useState(null);
            const [imgSize, setImgSize] = useState({ w: 0, h: 0 });
            const [zoom, setZoom] = useState(1);
            const [ppm, setPpm] = useState(120); 
            const [originPos, setOriginPos] = useState({ x: 250, y: 250 });

            const [wallHeight, setWallHeight] = useState(2.6);
            const [wallThickness, setWallThickness] = useState(0.2);
            const [walls, setWalls] = useState([]); 
            const [drawMode, setDrawMode] = useState('none'); 
            const [tempLine, setTempLine] = useState(null);
            const [guides, setGuides] = useState([]);
            const [snapPoint, setSnapPoint] = useState(null); 

            const [isFurnitureExpanded, setIsFurnitureExpanded] = useState(false);

            const [customConfig, setCustomConfig] = useState({ name: '自定义', w: 1.0, h: 1.0, d: 0.75, elevation: 0, color: '#8b5cf6', type: 'box' });

            const [items, setItems] = useState([
                { id: 1, name: '办公桌', w: 1.6, h: 0.6, d: 0.75, elevation: 0, x: 400, y: 150, r: 0, color: '#d97706', type: 'table' },
                { id: 2, name: '吸顶灯', w: 0.6, h: 0.6, d: 0.05, elevation: undefined, x: 450, y: 250, r: 0, color: '#fef08a', type: 'light' }
            ]);
            const [selectedId, setSelectedId] = useState(null);
            const [selectedWallId, setSelectedWallId] = useState(null);
            
            const [toast, setToast] = useState('');
            const [modal, setModal] = useState(null);
            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 3000); };

            const handleUpdateWall = (id, updates) => setWalls(prevWalls => prevWalls.map(w => w.id === id ? { ...w, ...updates } : w));
            const handleUpdateItem = (id, updates) => setItems(prevItems => prevItems.map(i => i.id === id ? { ...i, ...updates } : i));
            
            const handleUpdateWindowWidth = (id, newLogicalWidth) => {
                setWalls(prevWalls => {
                    const wIdx = prevWalls.findIndex(w => w.id === id);
                    if (wIdx === -1) return prevWalls;
                    const w = prevWalls[wIdx];
                    const dx = w.x2 - w.x1; const dy = w.y2 - w.y1;
                    const len = Math.hypot(dx, dy);
                    if (len === 0) return prevWalls;
                    
                    const cx = (w.x1 + w.x2)/2; const cy = (w.y1 + w.y2)/2;
                    const ndx = (dx / len) * newLogicalWidth; const ndy = (dy / len) * newLogicalWidth;
                    const nx1 = cx - ndx/2; const ny1 = cy - ndy/2;
                    const nx2 = cx + ndx/2; const ny2 = cy + ndy/2;
                    
                    return prevWalls.map(wall => {
                        if (wall.id === id) return { ...wall, x1: nx1, y1: ny1, x2: nx2, y2: ny2 };
                        let newWall = { ...wall };
                        const TOL = 0.5;
                        if (Math.hypot(wall.x1 - w.x1, wall.y1 - w.y1) < TOL) { newWall.x1 = nx1; newWall.y1 = ny1; }
                        if (Math.hypot(wall.x2 - w.x1, wall.y2 - w.y1) < TOL) { newWall.x2 = nx1; newWall.y2 = ny1; }
                        if (Math.hypot(wall.x1 - w.x2, wall.y1 - w.y2) < TOL) { newWall.x1 = nx2; newWall.y1 = ny2; }
                        if (Math.hypot(wall.x2 - w.x2, wall.y2 - w.y2) < TOL) { newWall.x2 = nx2; newWall.y2 = ny2; }
                        return newWall;
                    });
                });
            };

            const [savedLayouts, setSavedLayouts] = useState([]);
            const [saveName, setSaveName] = useState('');
            const [selectedSaveId, setSelectedSaveId] = useState('');

            useEffect(() => {
                const stored = localStorage.getItem('myFloorPlans');
                if (stored) try { setSavedLayouts(JSON.parse(stored)); } catch(e) {}
            }, []);

            const handleSave = () => {
                if (!saveName.trim()) return showToast("请输入存档名称！");
                const newSave = { id: Date.now().toString(), name: saveName, walls, items, ppm, originPos, wallHeight, wallThickness, bgImage: bgImage };
                try {
                    const newArr = [...savedLayouts, newSave];
                    localStorage.setItem('myFloorPlans', JSON.stringify(newArr));
                    setSavedLayouts(newArr); setSaveName(''); showToast("存档保存成功！");
                } catch (e) {
                    showToast("保存失败：图片过大。已剔除底图重试。");
                    const noImgArr = [...savedLayouts, { ...newSave, bgImage: null }];
                    localStorage.setItem('myFloorPlans', JSON.stringify(noImgArr));
                    setSavedLayouts(noImgArr); setSaveName('');
                }
            };

            const handleLoad = () => {
                if (!selectedSaveId) return showToast("请先选择一个存档！");
                const target = savedLayouts.find(s => s.id === selectedSaveId);
                if (target) {
                    setWalls(target.walls || []); setItems(target.items || []); setPpm(target.ppm || 120);
                    setOriginPos(target.originPos || { x: 250, y: 250 }); setWallHeight(target.wallHeight || 2.6);
                    setWallThickness(target.wallThickness || 0.2); if (target.bgImage) setBgImage(target.bgImage);
                    showToast("读取成功！");
                }
            };

            const handleDeleteSave = () => {
                if (!selectedSaveId) return;
                const newArr = savedLayouts.filter(s => s.id !== selectedSaveId);
                localStorage.setItem('myFloorPlans', JSON.stringify(newArr));
                setSavedLayouts(newArr); setSelectedSaveId('');
            };
            
            const addCustomItem = () => {
                setDrawMode('none');
                const nx = containerRef.current ? (containerRef.current.scrollLeft+150)/zoom : 100;
                const ny = containerRef.current ? (containerRef.current.scrollTop+150)/zoom : 100;
                setItems([...items, {id:Date.now(), name:customConfig.name||'未命名', w:Number(customConfig.w)||1, h:Number(customConfig.h)||1, d:Number(customConfig.d)||0.75, elevation:Number(customConfig.elevation)||0, x:nx, y:ny, r:0, color:customConfig.color||'#8b5cf6', type: customConfig.type}]);
            };

            const [draggingId, setDraggingId] = useState(null);
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [showRuler, setShowRuler] = useState(true);
            const [rulerLength, setRulerLength] = useState(3.03); 
            const [rulerState, setRulerState] = useState({ x: 40, y: 40, r: 0 }); 
            const containerRef = useRef(null);

            const pointToSegment = (x, y, x1, y1, x2, y2) => {
                const l2 = (x2 - x1)**2 + (y2 - y1)**2;
                if (l2 === 0) return { dist: Math.hypot(x - x1, y - y1), x: x1, y: y1 };
                let t = ((x - x1) * (x2 - x1) + (y - y1) * (y2 - y1)) / l2;
                t = Math.max(0, Math.min(1, t));
                const nx = x1 + t * (x2 - x1);
                const ny = y1 + t * (y2 - y1);
                return { dist: Math.hypot(x - nx, y - ny), x: nx, y: ny };
            };

            const SNAP_DIST = 30; 
            const getSnappedPoint = (x, y, currentWalls) => {
                let bestDist = SNAP_DIST;
                let bestPt = { x, y, snapped: false };
                for (let w of currentWalls) {
                    const d1 = Math.hypot(w.x1 - x, w.y1 - y);
                    if (d1 < bestDist) { bestDist = d1; bestPt = { x: w.x1, y: w.y1, snapped: true }; }
                    const d2 = Math.hypot(w.x2 - x, w.y2 - y);
                    if (d2 < bestDist) { bestDist = d2; bestPt = { x: w.x2, y: w.y2, snapped: true }; }
                }
                if (bestPt.snapped) return bestPt;
                for (let w of currentWalls) {
                    const proj = pointToSegment(x, y, w.x1, w.y1, w.x2, w.y2);
                    if (proj.dist < bestDist) { bestDist = proj.dist; bestPt = { x: proj.x, y: proj.y, snapped: true }; }
                }
                return bestPt;
            };

            const processImageSrc = (src) => {
                setBgImage(src);
                const img = new window.Image();
                img.onload = () => {
                    setImgSize({ w: img.width, h: img.height });
                    if (containerRef.current) {
                        const { clientWidth, clientHeight } = containerRef.current;
                        const scaleW = (clientWidth - 60) / img.width;
                        const scaleH = (clientHeight - 60) / img.height;
                        setZoom(Number(Math.min(scaleW, scaleH, 1).toFixed(2)));
                    }
                };
                img.src = src;
            };

            useEffect(() => {
                const handlePaste = (e) => {
                    if (viewMode !== '2d') return; 
                    const pasteItems = e.clipboardData?.items;
                    if (!pasteItems) return;
                    for (let i = 0; i < pasteItems.length; i++) {
                        if (pasteItems[i].type.indexOf('image') !== -1) {
                            const reader = new FileReader();
                            reader.onload = (ev) => processImageSrc(ev.target.result);
                            reader.readAsDataURL(pasteItems[i].getAsFile());
                        }
                    }
                };
                window.addEventListener('paste', handlePaste);
                return () => window.removeEventListener('paste', handlePaste);
            }, [viewMode]);

            const handlePointerDown = (e, id, logicalX, logicalY) => {
                e.stopPropagation();
                const container = containerRef.current;
                const rect = container.getBoundingClientRect();
                const pointerLogicalX = (e.clientX - rect.left + container.scrollLeft) / zoom;
                const pointerLogicalY = (e.clientY - rect.top + container.scrollTop) / zoom;

                if (id === null && drawMode !== 'none') {
                    const snapped = getSnappedPoint(pointerLogicalX, pointerLogicalY, walls);
                    setTempLine({ x1: snapped.x, y1: snapped.y, x2: snapped.x, y2: snapped.y });
                    setSelectedWallId(null); setSelectedId(null); setSnapPoint({ x: snapped.x, y: snapped.y });
                    return;
                }

                if (id !== null) {
                    if (drawMode !== 'none') { setDrawMode('none'); setTempLine(null); setGuides([]); setSnapPoint(null); }
                    if (id.toString().startsWith('wall_')) {
                        setSelectedWallId(id.replace('wall_', '')); setSelectedId(null);
                    } else {
                        setDraggingId(id); setSelectedId(id); setSelectedWallId(null);
                        setDragOffset({ x: pointerLogicalX - logicalX, y: pointerLogicalY - logicalY });
                    }
                } else { setSelectedId(null); setSelectedWallId(null); }
            };

            const handlePointerMove = (e) => {
                const container = containerRef.current;
                const rect = container.getBoundingClientRect();
                const pointerLogicalX = (e.clientX - rect.left + container.scrollLeft) / zoom;
                const pointerLogicalY = (e.clientY - rect.top + container.scrollTop) / zoom;

                if (drawMode !== 'none' && tempLine) {
                    let nx = pointerLogicalX; let ny = pointerLogicalY; let activeGuides = [];
                    
                    const snapResult = getSnappedPoint(nx, ny, walls);
                    if (snapResult.snapped) { nx = snapResult.x; ny = snapResult.y; setSnapPoint({ x: nx, y: ny }); } 
                    else {
                        setSnapPoint(null); 
                        const dx = Math.abs(nx - tempLine.x1); const dy = Math.abs(ny - tempLine.y1);
                        let forceOrthoX = false, forceOrthoY = false;
                        if (dx > dy * 1.5) forceOrthoY = true; else if (dy > dx * 1.5) forceOrthoX = true;
                        if (forceOrthoY) ny = tempLine.y1; if (forceOrthoX) nx = tempLine.x1;

                        const GUIDE_TOLERANCE = 10; let minDx = GUIDE_TOLERANCE, closestX = null; let minDy = GUIDE_TOLERANCE, closestY = null;
                        walls.forEach(w => {
                            [ {x: w.x1, y: w.y1}, {x: w.x2, y: w.y2} ].forEach(pt => {
                                if (Math.abs(nx - pt.x) < minDx) { minDx = Math.abs(nx - pt.x); closestX = pt.x; }
                                if (Math.abs(ny - pt.y) < minDy) { minDy = Math.abs(ny - pt.y); closestY = pt.y; }
                            });
                        });
                        if (!forceOrthoX && closestX !== null) { nx = closestX; activeGuides.push({type: 'v', pos: closestX}); }
                        if (!forceOrthoY && closestY !== null) { ny = closestY; activeGuides.push({type: 'h', pos: closestY}); }
                    }
                    setGuides(activeGuides); setTempLine(prev => ({ ...prev, x2: nx, y2: ny }));
                    return;
                }

                if (draggingId === null) return;
                const newX = pointerLogicalX - dragOffset.x;
                const newY = pointerLogicalY - dragOffset.y;

                if (draggingId === 'ruler') setRulerState(prev => ({ ...prev, x: newX, y: newY }));
                else if (draggingId === 'origin') setOriginPos({ x: newX, y: newY });
                else setItems(items.map(item => item.id === draggingId ? { ...item, x: newX, y: newY } : item));
            };

            const handlePointerUp = () => {
                if (drawMode !== 'none' && tempLine) {
                    const dist = Math.hypot(tempLine.x2 - tempLine.x1, tempLine.y2 - tempLine.y1);
                    if (dist > 5) { 
                        const newElement = { id: Date.now().toString(), ...tempLine, type: drawMode, sillHeight: drawMode === 'window' ? 0.9 : undefined, winHeight: drawMode === 'window' ? 1.4 : undefined };

                        if (drawMode === 'window') {
                            let resultWalls = [];
                            const w1 = {x: newElement.x1, y: newElement.y1}; const w2 = {x: newElement.x2, y: newElement.y2};

                            walls.forEach(wall => {
                                if (wall.type !== 'solid') { resultWalls.push(wall); return; }
                                const p1 = pointToSegment(w1.x, w1.y, wall.x1, wall.y1, wall.x2, wall.y2);
                                const p2 = pointToSegment(w2.x, w2.y, wall.x1, wall.y1, wall.x2, wall.y2);

                                if (p1.dist < 10 && p2.dist < 10) {
                                    const wallLen2 = (wall.x2 - wall.x1)**2 + (wall.y2 - wall.y1)**2;
                                    let t1 = ((p1.x - wall.x1)*(wall.x2 - wall.x1) + (p1.y - wall.y1)*(wall.y2 - wall.y1)) / wallLen2;
                                    let t2 = ((p2.x - wall.x1)*(wall.x2 - wall.x1) + (p2.y - wall.y1)*(wall.y2 - wall.y1)) / wallLen2;
                                    let minT = Math.max(0, Math.min(1, Math.min(t1, t2))); let maxT = Math.max(0, Math.min(1, Math.max(t1, t2)));

                                    if (maxT - minT > 0.02) { 
                                        if (minT > 0.02) resultWalls.push({ ...wall, id: Date.now() + Math.random().toString(), x2: wall.x1 + minT*(wall.x2-wall.x1), y2: wall.y1 + minT*(wall.y2-wall.y1) });
                                        if (maxT < 0.98) resultWalls.push({ ...wall, id: Date.now() + Math.random().toString(), x1: wall.x1 + maxT*(wall.x2-wall.x1), y1: wall.y1 + maxT*(wall.y2-wall.y1) });
                                    } else { resultWalls.push(wall); }
                                } else { resultWalls.push(wall); }
                            });
                            setWalls([...resultWalls, newElement]);
                        } else setWalls([...walls, newElement]);
                    }
                    setTempLine(null); setGuides([]); setSnapPoint(null); return;
                }
                setDraggingId(null);
            };

            useEffect(() => { window.addEventListener('pointerup', handlePointerUp); return () => window.removeEventListener('pointerup', handlePointerUp); });

            if (viewMode === '3d') return <RoomViewer3D items={items} ppm={ppm} originPos={originPos} walls={walls} wallHeight={wallHeight} wallThickness={wallThickness} onUpdateWall={handleUpdateWall} onUpdateWindowWidth={handleUpdateWindowWidth} onUpdateItem={handleUpdateItem} onExit={() => setViewMode('2d')} />;

            return (
                <div className="flex flex-col md:flex-row h-screen w-screen overflow-hidden font-sans text-gray-800">
                    {toast && <div className="fixed top-10 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-2xl z-[100] transition-opacity">{toast}</div>}
                    {modal && (
                        <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-[100] backdrop-blur-sm">
                            <div className="bg-white p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4">
                                <h3 className="text-lg font-bold text-gray-900 mb-4">⚠️ 请确认</h3><p className="text-gray-600 mb-6">{modal.text}</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setModal(null)} className="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg transition">取消</button>
                                    <button onClick={modal.onConfirm} className="px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition shadow-md">确定</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="w-full md:w-[360px] md:h-full h-1/2 flex-shrink-0 bg-white shadow-xl z-20 flex flex-col p-5 overflow-y-auto border-r border-gray-200">
                        <div className="flex justify-between items-center mb-4 border-b pb-3">
                            <h1 className="text-lg font-bold text-gray-900 truncate pr-2">家具摆放规划器</h1>
                            <div className="flex gap-1.5 flex-shrink-0">
                                <button onClick={() => setModal({ text: "确定清空墙体、窗户和家具吗？(保留图纸)", onConfirm: () => { setWalls([]); setItems([]); setSelectedId(null); setSelectedWallId(null); setModal(null); }})} className="bg-red-100 text-red-600 hover:bg-red-200 font-bold py-1.5 px-3 rounded-lg transition text-xs flex items-center shadow-sm whitespace-nowrap" title="清空墙体和家具">清空</button>
                                <button onClick={() => { if(walls.length === 0) showToast("请先用【墙体放样】画出几堵墙，再进入 3D！"); else setViewMode('3d'); }} className="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-1.5 px-3 rounded-lg shadow-lg transform transition hover:scale-105 flex items-center text-xs whitespace-nowrap">3D 巡视</button>
                            </div>
                        </div>

                        <div className="mb-4 bg-green-50 p-3 rounded-lg border border-green-200">
                            <h2 className="text-sm font-bold text-green-800 mb-2">💾 存档与加载</h2>
                            <div className="flex gap-2 mb-2"><input type="text" placeholder="输入存档名称..." value={saveName} onChange={e=>setSaveName(e.target.value)} className="flex-1 px-2 py-1 text-xs border rounded" /><button onClick={handleSave} className="bg-green-600 hover:bg-green-700 text-white px-3 py-1 text-xs rounded shadow-sm">保存</button></div>
                            <div className="flex gap-2 items-center">
                                <select value={selectedSaveId} onChange={e=>setSelectedSaveId(e.target.value)} className="flex-1 px-2 py-1 text-xs border rounded bg-white">
                                    <option value="">-- 选择已有存档 --</option>
                                    {savedLayouts.map(s => <option key={s.id} value={s.id}>{s.name} ({new Date(Number(s.id)).toLocaleDateString()})</option>)}
                                </select>
                                <button onClick={handleLoad} className="bg-white border border-green-600 text-green-700 hover:bg-green-100 px-3 py-1 text-xs rounded">读取</button>
                                <button onClick={handleDeleteSave} className="text-red-500 hover:text-red-700 text-xs px-1" title="删除存档">🗑️</button>
                            </div>
                        </div>

                        <div className="mb-4 space-y-3">
                            <div>
                                <h2 className="text-sm font-semibold text-gray-700 mb-1">1. 导入平面图</h2>
                                <input type="file" accept="image/*" onChange={(e) => { if(e.target.files[0]) { const r = new FileReader(); r.onload=ev=>processImageSrc(ev.target.result); r.readAsDataURL(e.target.files[0]); } }} className="block w-full text-xs text-slate-500 file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-gray-100 hover:file:bg-gray-200" />
                            </div>
                            <div className="bg-yellow-50 p-2 rounded border border-yellow-200">
                                <h2 className="text-sm font-semibold text-gray-700 flex justify-between items-center"><span>2. 对齐比例与原点</span><label className="flex items-center space-x-1 text-xs cursor-pointer"><input type="checkbox" checked={showRuler} onChange={(e) => setShowRuler(e.target.checked)} /><span>显示尺</span></label></h2>
                                <div className="flex gap-2 mt-2"><button onClick={() => setRulerState(p => ({...p, r: (p.r - 90) % 360}))} className="flex-1 bg-white border border-yellow-300 hover:bg-yellow-100 py-1 rounded text-xs text-yellow-700 transition cursor-pointer">↺ 转 90°</button><button onClick={() => setRulerState(p => ({...p, r: (p.r + 90) % 360}))} className="flex-1 bg-white border border-yellow-300 hover:bg-yellow-100 py-1 rounded text-xs text-yellow-700 transition cursor-pointer">↻ 转 90°</button></div>
                                <div className="flex items-center gap-2 mt-2"><label className="text-xs text-yellow-800 whitespace-nowrap">尺子长度(m):</label><input type="number" step="0.1" value={rulerLength} onChange={(e) => setRulerLength(Number(e.target.value))} className="w-full px-1 border rounded text-xs border-yellow-300 focus:outline-none focus:border-yellow-500" /></div>
                                <input type="range" min="10" max="300" value={ppm} onChange={(e) => setPpm(Number(e.target.value))} className="w-full mt-2" />
                            </div>
                        </div>

                        <div className="mb-4 bg-blue-50 p-3 rounded-lg border border-blue-200">
                            <div className="flex justify-between items-center mb-2"><h2 className="text-sm font-bold text-blue-800">3. 墙体放样</h2></div>
                            <div className="flex gap-2 mb-3 text-xs">
                                <div className="flex items-center gap-1 flex-1"><label className="text-blue-700 font-medium">层高(m):</label><input type="number" step="0.1" value={wallHeight} onChange={(e)=>setWallHeight(Number(e.target.value))} className="w-full px-1 border rounded" /></div>
                                <div className="flex items-center gap-1 flex-1"><label className="text-blue-700 font-medium">墙厚(m):</label><input type="number" step="0.05" min="0.05" max="0.5" value={wallThickness} onChange={(e)=>setWallThickness(Number(e.target.value))} className="w-full px-1 border rounded" /></div>
                            </div>
                            
                            <div className="flex gap-1 mb-2">
                                <button onClick={() => setDrawMode('none')} className={`flex-1 py-2 rounded text-[10px] font-bold border transition ${drawMode === 'none' ? 'bg-amber-100 text-amber-800 border-amber-300 shadow-inner' : 'bg-white text-gray-500 hover:bg-gray-100'}`}>👆 选择/编辑</button>
                                <button onClick={() => setDrawMode('solid')} className={`flex-1 py-2 rounded text-[10px] font-bold border transition ${drawMode === 'solid' ? 'bg-gray-800 text-white border-gray-800 shadow-inner' : 'bg-white text-gray-700 hover:bg-gray-100'}`}>{drawMode === 'solid' ? '🔴 画墙中' : '✏️ 画墙壁'}</button>
                                <button onClick={() => setDrawMode('window')} className={`flex-1 py-2 rounded text-[10px] font-bold border transition ${drawMode === 'window' ? 'bg-blue-500 text-white border-blue-500 shadow-inner' : 'bg-white text-blue-600 hover:bg-blue-50'}`}>{drawMode === 'window' ? '🔴 画窗中' : '🪟 画窗户'}</button>
                            </div>
                            {walls.length > 0 && <div className="flex justify-between items-center mt-2 border-t border-blue-200 pt-2"><span className="text-xs text-blue-700">已画线段: {walls.length} 条</span>{drawMode === 'none' && <span className="text-xs text-amber-600 font-bold animate-pulse">可点选图纸删除墙</span>}</div>}
                        </div>

                        {/* --- 核心优化：将家具面板折叠 --- */}
                        <div className="mb-4">
                            <button 
                                onClick={() => setIsFurnitureExpanded(!isFurnitureExpanded)} 
                                className="w-full flex justify-between items-center bg-gray-100 hover:bg-gray-200 border border-gray-200 p-2 rounded-lg transition-colors cursor-pointer"
                            >
                                <h2 className="text-sm font-bold text-gray-700">4. 放置参数化家具 🛋️</h2>
                                <span className="text-gray-500 text-xs">{isFurnitureExpanded ? '▼ 收起' : '▶ 展开'}</span>
                            </button>
                            
                            {isFurnitureExpanded && (
                                <div className="mt-3">
                                    <div className="grid grid-cols-3 gap-2">
                                        {[
                                            {n:'桌子',w:1.6,h:0.6,d:0.75,e:0,c:'#d97706', t:'table'}, 
                                            {n:'椅子',w:0.45,h:0.45,d:0.9,e:0,c:'#4b5563', t:'chair'}, 
                                            {n:'双人床',w:1.8,h:2.0,d:1.0,e:0,c:'#be185d', t:'bed'}, 
                                            {n:'大衣柜',w:2.0,h:0.6,d:2.4,e:0,c:'#854d0e', t:'wardrobe'}, 
                                            {n:'陈列架',w:0.8,h:0.3,d:1.8,e:0,c:'#374151', t:'rack'}, 
                                            {n:'马桶',w:0.4,h:0.7,d:0.8,e:0,c:'#f8fafc', t:'toilet'},
                                            {n:'洗手盆',w:0.8,h:0.5,d:0.85,e:0,c:'#e2e8f0', t:'basin'},
                                            {n:'厨房地柜',w:1.2,h:0.6,d:0.8,e:0,c:'#94a3b8', t:'cabinet'},
                                            {n:'厨房吊柜',w:1.0,h:0.35,d:0.8,e:1.6,c:'#e0e7ff', t:'cabinet'}, 
                                            {n:'💡 吸顶灯',w:0.6,h:0.6,d:0.05,e:undefined,c:'#fef08a', t:'light'}
                                        ].map((o,i) => (
                                            <button key={i} onClick={() => {
                                                setDrawMode('none'); 
                                                const nx = containerRef.current ? (containerRef.current.scrollLeft+150)/zoom : 100;
                                                const ny = containerRef.current ? (containerRef.current.scrollTop+150)/zoom : 100;
                                                setItems([...items, {id:Date.now(), name:o.n, w:o.w, h:o.h, d:o.d, elevation:o.e, x:nx, y:ny, r:0, color:o.c, type: o.t}]);
                                            }} className="bg-gray-50 border border-gray-200 hover:bg-gray-100 text-[11px] py-2 rounded shadow-sm font-bold truncate px-1">
                                                + {o.n}
                                            </button>
                                        ))}
                                    </div>
                                    
                                    <div className="bg-purple-50 p-3 rounded-lg border border-purple-200 mt-3 shadow-sm">
                                        <p className="text-sm font-medium mb-2 text-purple-800">✏️ 自定义添加</p>
                                        <div className="grid grid-cols-2 gap-2 mb-2 text-xs">
                                            <div><label className="block text-gray-600 mb-1">名称</label><input type="text" value={customConfig.name} onChange={e => setCustomConfig({...customConfig, name: e.target.value})} className="w-full border rounded px-1 py-1" /></div>
                                            <div><label className="block text-gray-600 mb-1">类别</label>
                                                <select value={customConfig.type} onChange={e => setCustomConfig({...customConfig, type: e.target.value})} className="w-full border rounded px-1 py-1 bg-white">
                                                    <option value="box">基础方块</option><option value="table">桌子</option><option value="chair">椅子</option><option value="bed">床铺</option><option value="wardrobe">衣柜</option><option value="rack">层架</option><option value="cabinet">地/吊柜</option><option value="toilet">马桶</option><option value="basin">洗手盆</option>
                                                </select>
                                            </div>
                                            <div><label className="block text-gray-600 mb-1">宽(X) m</label><input type="number" step="0.1" value={customConfig.w} onChange={e => setCustomConfig({...customConfig, w: e.target.value})} className="w-full border rounded px-1 py-1" /></div>
                                            <div><label className="block text-gray-600 mb-1">深(Y) m</label><input type="number" step="0.1" value={customConfig.h} onChange={e => setCustomConfig({...customConfig, h: e.target.value})} className="w-full border rounded px-1 py-1" /></div>
                                            <div><label className="block text-gray-600 mb-1">高(Z) m</label><input type="number" step="0.1" value={customConfig.d} onChange={e => setCustomConfig({...customConfig, d: e.target.value})} className="w-full border rounded px-1 py-1" /></div>
                                            <div><label className="block text-gray-600 mb-1">离地高度 m</label><input type="number" step="0.1" value={customConfig.elevation} onChange={e => setCustomConfig({...customConfig, elevation: e.target.value})} className="w-full border rounded px-1 py-1" /></div>
                                            <div className="col-span-2"><label className="block text-gray-600 mb-1">颜色</label><input type="color" value={customConfig.color} onChange={e => setCustomConfig({...customConfig, color: e.target.value})} className="w-full h-6 border rounded cursor-pointer bg-white" /></div>
                                        </div>
                                        <button onClick={addCustomItem} className="w-full bg-purple-600 hover:bg-purple-700 text-white py-1.5 rounded text-sm transition shadow-sm cursor-pointer">➕ 添加</button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {(selectedId && selectedId !== 'ruler' && selectedId !== 'origin' && drawMode === 'none') && (() => {
                            const selItem = items.find(i=>i.id===selectedId);
                            if(!selItem) return null;
                            return (
                            <div className="bg-gray-50 p-3 rounded-lg border border-gray-200 mt-auto shadow-sm">
                                <div className="flex justify-between items-center mb-2">
                                    <p className="text-xs font-bold text-gray-800">编辑选中物品</p>
                                    <input type="color" value={selItem.color || '#000000'} onChange={(e) => setItems(items.map(i=>i.id===selectedId?{...i, color: e.target.value}:i))} className="w-5 h-5 p-0 border-0 rounded cursor-pointer" title="修改颜色" />
                                </div>
                                
                                <div className="grid grid-cols-2 gap-2 mb-2 text-xs">
                                    <div><label className="text-gray-500">宽(X)m:</label><input type="number" step="0.1" value={selItem.w} onChange={(e) => setItems(items.map(i=>i.id===selectedId?{...i, w:Number(e.target.value)}:i))} className="w-full border rounded px-1" /></div>
                                    <div><label className="text-gray-500">深(Y)m:</label><input type="number" step="0.1" value={selItem.h} onChange={(e) => setItems(items.map(i=>i.id===selectedId?{...i, h:Number(e.target.value)}:i))} className="w-full border rounded px-1" /></div>
                                    <div><label className="text-gray-500">自身高度m:</label><input type="number" step="0.1" value={selItem.d || 0.75} onChange={(e) => setItems(items.map(i=>i.id===selectedId?{...i, d:Number(e.target.value)}:i))} className="w-full border rounded px-1" /></div>
                                    <div><label className="text-gray-500">离地高度m:</label><input type="number" step="0.1" value={selItem.elevation || 0} onChange={(e) => setItems(items.map(i=>i.id===selectedId?{...i, elevation:Number(e.target.value)}:i))} className="w-full border rounded px-1" /></div>
                                </div>

                                <div className="flex gap-2 mb-2">
                                    <button onClick={() => setItems(items.map(i=>i.id===selectedId?{...i, r:(i.r-90)%360}:i))} className="flex-1 bg-white border hover:bg-gray-100 py-1 rounded text-xs transition">↺ 转 90°</button>
                                    <button onClick={() => setItems(items.map(i=>i.id===selectedId?{...i, r:(i.r+90)%360}:i))} className="flex-1 bg-white border hover:bg-gray-100 py-1 rounded text-xs transition">↻ 转 90°</button>
                                </div>
                                <button onClick={() => {setItems(items.filter(i=>i.id!==selectedId)); setSelectedId(null);}} className="w-full bg-red-100 text-red-600 hover:bg-red-200 py-1.5 rounded text-xs font-bold transition">🗑️ 删除该物品</button>
                            </div>
                        )})()}
                        
                        {(selectedWallId && drawMode === 'none') && (
                            <div className="bg-red-50 p-3 rounded-lg border border-red-200 mt-auto">
                                <p className="text-xs font-bold text-red-800 mb-2">编辑选中墙体 / 窗户</p>
                                <button onClick={() => {setWalls(walls.filter(w=>w.id !== selectedWallId)); setSelectedWallId(null);}} className="w-full bg-red-600 text-white hover:bg-red-700 py-2 rounded text-xs font-bold transition shadow-sm">
                                    🗑️ 删除选中线段
                                </button>
                            </div>
                        )}
                    </div>

                    <div 
                        className={`flex-1 relative overflow-auto grid-bg-dynamic ${drawMode !== 'none' ? 'cursor-crosshair' : 'cursor-default'} no-scrollbar touch-none`}
                        ref={containerRef}
                        onPointerMove={handlePointerMove}
                        onPointerDown={(e) => handlePointerDown(e, null, 0, 0)} 
                        style={{ backgroundSize: `${20 * zoom}px ${20 * zoom}px` }} 
                    >
                        <div className="fixed md:absolute bottom-6 right-6 flex items-center bg-white shadow-xl rounded-lg border z-50 text-sm">
                            <button onClick={() => setZoom(z => Math.max(0.1, Number((z - 0.1).toFixed(2))))} className="px-3 py-2 border-r">➖</button>
                            <span className="px-4 py-2 min-w-[4rem] text-center">{Math.round(zoom * 100)}%</span>
                            <button onClick={() => setZoom(z => Math.min(5, Number((z + 0.1).toFixed(2))))} className="px-3 py-2 border-l">➕</button>
                        </div>

                        {!bgImage && <div className="absolute inset-0 flex items-center justify-center text-gray-400 font-medium z-0">请在左侧上传或直接 Ctrl+V 粘贴平面图</div>}

                        {bgImage && (
                            <img src={bgImage} className="absolute top-0 left-0 pointer-events-none origin-top-left shadow-lg"
                                style={{ width: imgSize.w ? `${imgSize.w * zoom}px` : 'auto', height: imgSize.h ? `${imgSize.h * zoom}px` : 'auto', zIndex: 0 }}
                            />
                        )}

                        <svg className="absolute top-0 left-0 pointer-events-none" style={{ width: '10000px', height: '10000px', zIndex: 5 }}>
                            {guides.map((g, i) => {
                                if (g.type === 'v') return <line key={`gv-${i}`} x1={g.pos * zoom} y1={-10000} x2={g.pos * zoom} y2={10000} stroke="#ec4899" strokeWidth="1" strokeDasharray="5 5" opacity="0.6" />;
                                if (g.type === 'h') return <line key={`gh-${i}`} x1={-10000} y1={g.pos * zoom} x2={10000} y2={g.pos * zoom} stroke="#ec4899" strokeWidth="1" strokeDasharray="5 5" opacity="0.6" />;
                                return null;
                            })}
                            
                            {walls.map(w => (
                                <g key={w.id}>
                                    <line 
                                        x1={w.x1 * zoom} y1={w.y1 * zoom} 
                                        x2={w.x2 * zoom} y2={w.y2 * zoom}
                                        stroke="transparent"
                                        strokeWidth={Math.max(wallThickness * ppm * zoom, 24)} 
                                        className={drawMode === 'none' ? "cursor-pointer pointer-events-auto" : "pointer-events-none"}
                                        style={{ pointerEvents: drawMode === 'none' ? 'stroke' : 'none' }}
                                        onPointerDown={(e) => handlePointerDown(e, `wall_${w.id}`, 0, 0)}
                                    />
                                    <line 
                                        x1={w.x1 * zoom} y1={w.y1 * zoom} 
                                        x2={w.x2 * zoom} y2={w.y2 * zoom}
                                        stroke={selectedWallId === w.id ? '#ef4444' : (w.type === 'window' ? '#3b82f6' : '#1f2937')} 
                                        strokeWidth={wallThickness * ppm * zoom} 
                                        strokeLinecap="square" 
                                        opacity={w.type === 'window' ? 0.7 : 0.9}
                                        className="pointer-events-none transition-colors"
                                    />
                                </g>
                            ))}
                            {tempLine && (
                                <line 
                                    x1={tempLine.x1 * zoom} y1={tempLine.y1 * zoom} 
                                    x2={tempLine.x2 * zoom} y2={tempLine.y2 * zoom}
                                    stroke={drawMode === 'window' ? '#3b82f6' : '#1f2937'} 
                                    strokeWidth={wallThickness * ppm * zoom} 
                                    strokeDasharray="8 8"
                                    strokeLinecap="square" 
                                />
                            )}
                            
                            {snapPoint && drawMode !== 'none' && (
                                <circle 
                                    cx={snapPoint.x * zoom} cy={snapPoint.y * zoom} 
                                    r={8} fill="#10b981" stroke="#ffffff" strokeWidth="2"
                                />
                            )}
                        </svg>

                        <div 
                            className="absolute flex flex-col items-center justify-center z-50 cursor-move drop-shadow-xl"
                            style={{ left: `${originPos.x * zoom}px`, top: `${originPos.y * zoom}px`, transform: 'translate(-50%, -50%)', touchAction: 'none' }}
                            onPointerDown={(e) => handlePointerDown(e, 'origin', originPos.x, originPos.y)}
                        >
                            <div className={`w-8 h-8 rounded-full border-4 border-red-600 bg-red-500/50 flex items-center justify-center animate-bounce ${selectedId==='origin'?'ring-4 ring-red-300':''}`}>
                                <div className="w-2 h-2 bg-white rounded-full"></div>
                            </div>
                            <span className="mt-1 bg-red-600 text-white text-[10px] px-2 py-0.5 rounded-full whitespace-nowrap pointer-events-none font-bold">
                                📍 起点锚点
                            </span>
                        </div>

                        {showRuler && (
                            <div className={`absolute bg-yellow-400/80 border-2 border-yellow-600 shadow-md z-40 cursor-move ${selectedId==='ruler'?'ring-2 ring-yellow-400':''}`}
                                style={{ width: `${rulerLength * ppm * zoom}px`, height: '8px', left: `${rulerState.x * zoom}px`, top: `${rulerState.y * zoom}px`, transform: `rotate(${rulerState.r}deg)`, borderRadius: '4px', touchAction: 'none' }}
                                onPointerDown={(e) => handlePointerDown(e, 'ruler', rulerState.x, rulerState.y)}
                            >
                                <span className="absolute whitespace-nowrap bg-white text-yellow-700 px-1 rounded shadow text-[10px] pointer-events-none" style={{ top: '-20px', transform: `rotate(${-rulerState.r}deg)` }}>
                                    尺子：{rulerLength}m
                                </span>
                            </div>
                        )}

                        {items.map(item => (
                            <div key={item.id} className="absolute flex flex-col items-center justify-center cursor-move select-none transition-shadow"
                                style={{
                                    width: `${item.w * ppm * zoom}px`, height: `${item.h * ppm * zoom}px`,
                                    left: `${item.x * zoom}px`, top: `${item.y * zoom}px`, transform: `rotate(${item.r}deg)`,
                                    backgroundColor: `${item.color}ee`, 
                                    border: item.id === selectedId ? '3px solid #000' : '2px solid rgba(0,0,0,0.5)',
                                    boxShadow: item.id === selectedId ? '0 10px 20px -5px rgba(0,0,0,0.5)' : '0 4px 6px -1px rgba(0,0,0,0.3)',
                                    zIndex: item.id === selectedId ? 30 : 10, 
                                    borderRadius: item.type === 'light' ? '50%' : '4px', 
                                    touchAction: 'none'
                                }}
                                onPointerDown={(e) => handlePointerDown(e, item.id, item.x, item.y)}
                            >
                                <div className="flex flex-col items-center justify-center w-full h-full pointer-events-none" style={{ transform: `scale(${Math.min(zoom, 1)})` }}>
                                    <span className="text-gray-900 font-bold drop-shadow-md text-sm text-center leading-tight mix-blend-difference text-white">
                                        {item.name}<br/>
                                        <span className="text-[10px] opacity-80">{item.w}x{item.h}x{item.d || 0.75}m</span><br/>
                                        {item.elevation > 0 && <span className="text-[10px] text-yellow-300">↑离地 {item.elevation}m</span>}
                                    </span>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
